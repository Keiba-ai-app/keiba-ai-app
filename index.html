<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI競馬分析 V52.0 Final Restoration</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #2563eb; --card: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        select, input, textarea { width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px; }
        textarea { height: 150px; font-family: monospace; }
        .btn-group { display: flex; gap: 5px; margin: 10px 0; }
        .tgl { flex: 1; padding: 10px; background: #334155; border: none; border-radius: 4px; color: #94a3b8; font-weight: bold; cursor: pointer; }
        .tgl.active { background: var(--accent); color: white; }
        .exec-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; }
        #res-area { margin-top: 20px; display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        #bet-output { white-space: pre-wrap; font-family: monospace; font-size: 14px; }
        .section-title { font-size: 12px; font-weight: bold; color: #fbbf24; margin-bottom: 10px; }
        .bar-row { margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 6px; background: #000; border-radius: 3px; }
        .bar-fill { height: 100%; background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="section-title">Race Settings</div>
        <div class="grid-3" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <select id="course">
                <option>船橋</option><option>園田</option><option>大井</option><option>川崎</option><option>浦和</option>
                <option>高知</option><option>佐賀</option><option>東京</option><option>中山</option><option>中京</option>
            </select>
            <select id="surface"><option>ダート</option><option>芝</option></select>
            <input type="number" id="dist" value="1200">
        </div>
        <div class="grid-2" style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <select id="dir"><option>左回り</option><option>右回り</option></select>
            <select id="cond">
                <option value="good">良</option><option value="soft">稍重</option>
                <option value="heavy">重</option><option value="bad">不良</option>
            </select>
        </div>

        <div class="section-title">AI Mode Selection</div>
        <div class="btn-group">
            <button id="btnA" class="tgl" onclick="toggle('A')">1人気消し</button>
            <button id="btnW" class="tgl" onclick="toggle('W')">穴軸モード</button>
        </div>

        <textarea id="raw" placeholder="着順 枠番 馬番 馬名 タイム オッズ..."></textarea>
        <button class="exec-btn" onclick="run()">🚀 分析開始・買い目生成</button>
    </div>
