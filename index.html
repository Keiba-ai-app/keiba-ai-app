<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <title>競馬分析アプリ</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #111;
      padding: 15px;
      border: 2px solid #555;
      border-radius: 12px;
      box-sizing: border-box;
    }
    input, select, textarea, button {
      box-sizing: border-box;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #666;
      background: #222;
      color: #fff;
      padding: 12px;
      font-size: 16px;
    }
    textarea {
      min-height: 180px;
      resize: vertical;
      margin-bottom: 12px;
      font-family: monospace;
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .buttons {
      display: flex;
      gap: 8px;
      margin: 0 0 15px 0;
    }
    .buttons button {
      flex: 1;
      width: auto;
      border: none;
      font-weight: bold;
      background: #444;
    }
    #mainRun {
      background: #2563eb;
      border: none;
      font-weight: bold;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 0 #1e40af;
      margin-bottom: 14px;
    }
    .result-box {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .label {
      font-size: 13px;
      color: #bbb;
      margin: 8px 0;
    }
    #ranking {
      background: #161616;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      min-height: 80px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <textarea id="rawGrid" placeholder="ここにタブ区切りデータを貼り付け\n例:\n1\t馬名A\t1\t-\t58.2\t中京1200良右\n2\t馬名B\t3\t-\t53.4\t中京1200稍重右"></textarea>

    <input id="inDist" type="text" placeholder="距離 (例: 1200)" style="margin-bottom:8px;">

    <div class="grid2">
      <select id="selCond">
        <option value="">馬場状態</option>
        <option value="良">良</option>
        <option value="稍重">稍重</option>
        <option value="重">重</option>
        <option value="不良">不良</option>
      </select>
      <select id="selDir">
        <option value="">回り</option>
        <option value="左">左回り</option>
        <option value="右">右回り</option>
      </select>
    </div>

    <select id="selCourse" style="margin-bottom:12px;">
      <option value="">競馬場を選択</option>
      <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
      <option value="京都">京都</option><option value="新潟">新潟</option><option value="大井">大井</option><option value="船橋">船橋</option>
    </select>

    <div class="buttons">
      <button type="button" id="btnAnti">1人気消し</button>
      <button type="button" id="btnW">W軸(1着2頭)</button>
    </div>

    <button type="button" id="mainRun">🚀 分析実行</button>

    <div id="bet3tanM" class="result-box"><b>【3連単マルチ】</b> ここに表示</div>
    <div id="bet3tanF" class="result-box"><b>【3連単F】</b> ここに表示</div>
    <div id="bet3pukuF" class="result-box"><b>【3連複F】</b> ここに表示</div>

    <div class="label">ランキング</div>
    <div id="ranking">まだ分析していません</div>
  </div>

  <script>
    window.fAnti = false;
    window.fW = false;

    document.getElementById('btnAnti').addEventListener('click', function () {
      window.fAnti = !window.fAnti;
      this.style.background = window.fAnti ? '#ef4444' : '#444';
      document.getElementById('mainRun').click();
    });

    document.getElementById('btnW').addEventListener('click', function () {
      window.fW = !window.fW;
      this.style.background = window.fW ? '#f59e0b' : '#444';
      document.getElementById('mainRun').click();
    });

    document.getElementById('mainRun').addEventListener('click', function () {
      var area = document.getElementById('rawGrid');
      if (!area || !area.value.trim()) {
        alert('データを貼り付けてください');
        return;
      }

      var lines = area.value.split('\n').filter(function (l) { return l.trim() !== ''; });
      var list = lines.map(function (line) {
        var d = line.split('\t');
        var s = parseFloat(d[4]) || 0;
        var txt = (d[1] || '') + (d[5] || '');

        if (document.getElementById('inDist').value && txt.includes(document.getElementById('inDist').value)) s += 5;
        if (document.getElementById('selCond').value && txt.includes(document.getElementById('selCond').value)) s += 5;
        if (document.getElementById('selCourse').value && txt.includes(document.getElementById('selCourse').value)) s += 5;
        if (document.getElementById('selDir').value && txt.includes(document.getElementById('selDir').value)) s += 5;

        return {
          no: d[0] || '-',
          name: d[1] || '',
          pop: parseInt(d[2], 10) || 99,
          score: s
        };
      });

      list.sort(function (a, b) { return b.score - a.score; });
      var nonFav = list.filter(function (r) { return r.pop !== 1; });
      var jiku = window.fAnti ? (nonFav[0] || list[0]) : list[0];
      if (!jiku) return;

      var aite = list.filter(function (r) { return r.no !== jiku.no; });
      var h5 = aite.slice(0, 5);
      var hNos = h5.map(function (h) { return h.no; }).sort(function (a, b) { return Number(a) - Number(b); });
      var f2 = aite.slice(5).filter(function (r) {
        var idx = list.findIndex(function (x) { return x.no === r.no; });
        var prev = idx > 0 ? list[idx - 1] : null;
        return (prev && (prev.score - r.score > 8)) || r.score > 40;
      }).slice(0, 2);

      var comb = hNos.concat(f2.map(function (f) { return f.no; })).sort(function (a, b) { return Number(a) - Number(b); });
      var first = window.fW && aite[0]
        ? [jiku.no, aite[0].no].sort(function (a, b) { return Number(a) - Number(b); }).join(',')
        : jiku.no;

      document.getElementById('bet3tanM').innerHTML = '<b>【3連単マルチ】</b> 軸 ' + jiku.no + ' ↔ ' + hNos.join(',');
      document.getElementById('bet3tanF').innerHTML = '<b>【3連単F】</b> ' + first + ' → ' + comb.join(',') + ' → 全';
      document.getElementById('bet3pukuF').innerHTML = '<b>【3連複F】</b> ' + first + ' / ' + comb.join(',') + ' / 全';

      document.getElementById('ranking').innerHTML = list.map(function (r, i) {
        var isA = f2.some(function (f) { return f.no === r.no; });
        return '<div style="color:' + (isA ? '#ef4444' : '#fff') + '">' + (i + 1) + '位: ' + r.no + '番 ' + (r.name ? '(' + r.name + ') ' : '') + '(' + r.score.toFixed(1) + 'pt)</div>';
      }).join('');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
