<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V7.0.1 コース適性復活版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.row > div{flex:1}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px}
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V7.0.1 - コース適性復活版</div>

  <div class="card">
    <div style="margin-bottom:10px;">
      <button id="btnAnti" onclick="toggleAnti()" style="padding:10px;">1人気消し</button>
      <button id="btnDouble" onclick="toggleDouble()" style="padding:10px;">1着2頭(W軸)</button>
    </div>

    <label>入力（タブ区切り: 馬番 馬名 人気 オッズ スコア 詳細）</label>
    <textarea id="rawGrid" rows="8" placeholder="1	馬名	3	5.2	72	右回り得意"></textarea>
    <button class="exec" onclick="calc()">分析実行</button>
  </div>

  <div class="card">
    <div class="title">💰 買い目</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📋 ランキング</div>
    <div id="horseList" style="font-size:14px"></div>
  </div>
</div>

<script>
// --- 設定用変数（グローバル） ---
let antiFav = false;
let doubleJiku = false;

function toggleAnti() {
  antiFav = !antiFav;
  document.getElementById('btnAnti').style.backgroundColor = antiFav ? '#ef4444' : '';
  calc();
}

function toggleDouble() {
  doubleJiku = !doubleJiku;
  document.getElementById('btnDouble').style.backgroundColor = doubleJiku ? '#f59e0b' : '';
  calc();
}

const $ = (id) => document.getElementById(id);
const n = (v) => parseFloat(v) || 0;

function calc() {
  const input = $('rawGrid').value;
  if(!input) return;

  // 1. データパース & コース適性判定の復活
  const lines = input.split('\n').filter(l => l.trim());
  let allRows = lines.map(line => {
    const d = line.split('\t');
    let baseScore = n(d[4]);

    // 【重要】d[1]（馬名）やd[5]（詳細）に含まれる「右」「左」を再スキャン
    let detail = (d[1] || "") + (d[5] || "");
    let courseMark = "";
    if(detail.includes("右")) courseMark = "右";
    if(detail.includes("左")) courseMark = "左";

    return { no: d[0], name: d[1], pop: n(d[2]), odds: n(d[3]), score: baseScore, course: courseMark };
  }).filter(r => r.no && r.name);

  if(allRows.length === 0) return;

  // 2. 適性スコアで18頭フルソート
  let rankRows = [...allRows].sort((a,b) => b.score - a.score);
  let jiku = (antiFav) ? rankRows.filter(r => r.pop !== 1)[0] : rankRows[0];
  if(!jiku) jiku = rankRows[0];
  let aiteList = rankRows.filter(r => r.no !== jiku.no);

  // 3. 推奨7頭（本線5 + 伏兵2）
  let honsen5 = aiteList.slice(0, 5);
  // 11位以下で断層がある、またはスコア40以上の伏兵を2頭抽出
  let fukuhei2 = aiteList.slice(5).filter((r) => {
    let gIdx = rankRows.findIndex(x => x.no === r.no);
    return ((gIdx > 0) && (rankRows[gIdx-1].score - r.score > 8)) || (gIdx >= 10 && r.score > 40);
  }).slice(0, 2);

  const honsenNos = honsen5.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const anaNos = fukuhei2.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const combined = [...new Set([...honsenNos, ...anaNos])].sort((x,y)=>n(x)-n(y));

  // 4. 買い目生成
  let firstRow = (doubleJiku && aiteList[0]) ? [jiku.no, aiteList[0].no].sort((a,b)=>n(a)-n(b)).join(',') : jiku.no;
  const wideNet = rankRows.map(r=>r.no).slice(0, 18).sort((x,y)=>n(x)-n(y));

  // 5. 表示反映
  if($('bet3tanM')) $('bet3tanM').innerHTML = `<b>3連単マルチ(60点)</b><br>軸: ${jiku.no} ↔ 相手: ${honsenNos.join(', ')}`;

  if($('bet3tanF')) {
    $('bet3tanF').innerHTML = `<b>3連単F (${doubleJiku?'W軸':'1軸'})</b><br>${firstRow} → ${combined.join(',')} → 3着全網羅(18頭)`;
  }

  if($('bet3pukuF')) {
    $('bet3pukuF').innerHTML = `<b>3連複F (${doubleJiku?'W軸':'1軸'})</b><br>${firstRow} / ${combined.join(',')} / 18頭全網羅`;
  }

  // 6. リスト表示（コース適性と伏兵マーク）
  if($('horseList')) {
    let html = "";
    rankRows.forEach((r, i) => {
      let isAna = fukuhei2.some(f => f.no === r.no);
      let cMark = r.course ? `<span style="color:#10b981;">[${r.course}]</span>` : "";
      html += `<div style="color:${isAna?'#ef4444':'#fff'}">${i+1}位: ${r.no} ${r.name} ${cMark} (${r.score}pt)${isAna?' !!伏兵!!':''}</div>`;
    });
    $('horseList').innerHTML = html;
  }
}
</script>
</body>
</html>
