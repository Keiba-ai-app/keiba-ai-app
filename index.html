<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競馬分析ツール</title>
</head>
<body style="background:#000; margin:0; padding:20px; font-family:sans-serif; color:#fff;">
  <textarea id="rawGrid" placeholder="ここにタブ区切りデータを貼り付け" style="width:100%; min-height:180px; padding:12px; background:#111; color:#fff; border:1px solid #555; border-radius:8px; margin-bottom:16px;"></textarea>

  <div style="background:#111; padding:15px; border:2px solid #555; color:#fff; border-radius:12px; font-family:sans-serif;">
    <div style="margin-bottom:12px;">
      <input id="inDist" type="text" placeholder="距離 (例: 1200)" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #666; margin-bottom:8px; border-radius:6px; font-size:16px;">
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
        <select id="selCond" style="padding:12px; background:#222; color:#fff; border:1px solid #666; border-radius:6px;">
          <option value="">馬場状態</option>
          <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
        </select>
        <select id="selDir" style="padding:12px; background:#222; color:#fff; border:1px solid #666; border-radius:6px;">
          <option value="">回り</option><option value="左">左回り</option><option value="右">右回り</option>
        </select>
      </div>

      <select id="selCourse" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #666; border-radius:6px; margin-bottom:12px;">
        <option value="">競馬場を選択</option>
        <optgroup label="中央">
          <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
          <option value="京都">京都</option><option value="新潟">新潟</option><option value="小倉">小倉</option><option value="福島">福島</option>
          <option value="札幌">札幌</option><option value="函館">函館</option>
        </optgroup>
        <optgroup label="地方">
          <option value="大井">大井</option><option value="川崎">川崎</option><option value="船橋">船橋</option><option value="浦和">浦和</option><option value="高知">高知</option>
        </optgroup>
      </select>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:15px;">
      <button type="button" id="btnAnti" onclick="window.fAnti=!window.fAnti; this.style.background=window.fAnti?'#ef4444':'#444'; document.getElementById('mainRun').click();" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:6px; font-weight:bold;">1人気消し</button>
      <button type="button" id="btnW" onclick="window.fW=!window.fW; this.style.background=window.fW?'#f59e0b':'#444'; document.getElementById('mainRun').click();" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:6px; font-weight:bold;">W軸(1着2頭)</button>
    </div>
    
    <button type="button" id="mainRun" onclick="
      var area = document.getElementById('rawGrid');
      if(!area || !area.value) { alert('データがありません'); return; }
      var lines = area.value.split('\n').filter(l => l.trim() !== '');
      var list = lines.map(line => {
        var d = line.split('\t');
        var s = parseFloat(d[4]) || 0;
        var txt = (d[1]||'') + (d[5]||'');
        if(document.getElementById('inDist').value && txt.includes(document.getElementById('inDist').value)) s += 5;
        if(document.getElementById('selCond').value && txt.includes(document.getElementById('selCond').value)) s += 5;
        if(document.getElementById('selCourse').value && txt.includes(document.getElementById('selCourse').value)) s += 5;
        if(document.getElementById('selDir').value && txt.includes(document.getElementById('selDir').value)) s += 5;
        return { no: d[0], name: d[1], pop: parseInt(d[2])||99, score: s };
      });
      list.sort((a,b) => b.score - a.score);
      var jiku = window.fAnti ? list.filter(r => r.pop !== 1)[0] : list[0];
      if(!jiku) jiku = list[0];
      var aite = list.filter(r => r.no !== jiku.no);
      var h5 = aite.slice(0, 5);
      var f2 = aite.slice(5).filter(r => {
        var idx = list.indexOf(r);
        return (list[idx-1].score - r.score > 8) || (idx >= 10 && r.score > 40);
      }).slice(0, 2);
      var hNos = h5.map(h => h.no).sort((a,b)=>a-b);
      var comb = hNos.concat(f2.map(f=>f.no)).sort((a,b)=>a-b);
      var first = window.fW ? [jiku.no, aite[0].no].sort((a,b)=>a-b).join(',') : jiku.no;
      
      document.getElementById('bet3tanM').innerHTML = '<b>【3連単マルチ 60点】</b><br>軸 ' + jiku.no + ' ↔ 相手 ' + hNos.join(', ');
      document.getElementById('bet3tanF').innerHTML = '<b>【3連単F】</b><br>' + first + ' → ' + comb.join(',') + ' → 18頭全網羅';
      document.getElementById('bet3pukuF').innerHTML = '<b>【3連複F】</b><br>' + first + ' / ' + comb.join(',') + ' / 全網羅';
      
      var target = document.getElementById('horseList') || document.getElementById('ranking');
      if(target) {
        target.innerHTML = list.map((r, i) => {
          var isA = f2.some(f => f.no === r.no);
          return '<div style=\'color:' + (isA ? '#ef4444' : '#fff') + '\'>' + (i+1) + '位: ' + r.no + ' (' + r.score.toFixed(1) + 'pt)' + (isA ? ' !!' : '') + '</div>';
        }).join('');
      }
    " style="width:100%; padding:22px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:22px; cursor:pointer; box-shadow: 0 5px 0 #1e40af;">🔥 分析実行 (ここをタップ)</button>
  </div>

  <div style="margin-top:20px; display:grid; gap:12px;">
    <div id="bet3tanM" style="background:#111; border:1px solid #444; border-radius:8px; padding:12px;"></div>
    <div id="bet3tanF" style="background:#111; border:1px solid #444; border-radius:8px; padding:12px;"></div>
    <div id="bet3pukuF" style="background:#111; border:1px solid #444; border-radius:8px; padding:12px;"></div>
    <div id="horseList" style="background:#111; border:1px solid #444; border-radius:8px; padding:12px;"></div>
  </div>

  <script>
    window.fAnti = false;
    window.fW = false;
  </script>
</body>
</html>
