<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>競馬AI指数アプリ</title>
<meta name="theme-color" content="#0f172a" />
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#081121;--card:#0f172a;--line:#243146;--text:#f8fafc;--sub:#cbd5e1;--accent:#f59e0b;--accent2:#38bdf8;--green:#22c55e;--red:#ef4444;--amber:#fbbf24}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:linear-gradient(180deg,#081121 0%,#0b1326 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}
.app{max-width:520px;margin:0 auto;padding:18px 14px 120px}
.title{font-size:38px;line-height:1.05;font-weight:900;letter-spacing:-0.02em;margin:8px 0 6px}
.subtitle{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:18px}
.card{background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 12px 28px rgba(0,0,0,.18)}
.section-title{font-size:17px;font-weight:800;margin:0 0 12px}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.label{font-size:12px;color:var(--sub);margin:0 0 6px 2px}
.field{min-width:0}
input,select,textarea{width:100%;max-width:100%;min-width:0;background:#08101f;border:1px solid #31415d;color:var(--text);border-radius:16px;padding:14px 14px;font-size:16px;outline:none;appearance:none;-webkit-appearance:none}
select{background-image:linear-gradient(45deg, transparent 50%, #94a3b8 50%),linear-gradient(135deg, #94a3b8 50%, transparent 50%);background-position:calc(100% - 18px) calc(50% - 3px),calc(100% - 12px) calc(50% - 3px);background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:34px}
textarea{min-height:240px;line-height:1.5;resize:vertical}
.btn{width:100%;border:none;border-radius:18px;padding:15px 16px;font-size:18px;font-weight:900;cursor:pointer}
.btn-primary{background:var(--accent);color:#111827}
.btn-secondary{background:#1d4ed8;color:#fff}
.btn-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-top:12px}
.note{padding:12px 14px;border-radius:16px;background:#3a2203;border:1px solid #8b5a11;color:#fde68a;font-size:13px;line-height:1.55}
.tips{font-size:12px;color:var(--sub);line-height:1.55;margin-top:10px}
.kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.kpi{background:#0a1220;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}
.kpi .k{font-size:11px;color:var(--sub)}
.kpi .v{font-size:24px;font-weight:900;margin-top:6px;word-break:break-word}
.horse{background:#0a1220;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:10px}
.name{font-size:20px;font-weight:900}
.muted{font-size:13px;color:var(--sub);margin-top:4px}
.score{font-size:32px;font-weight:900;margin-top:8px}
.bar{height:10px;background:#08101f;border:1px solid #22304a;border-radius:999px;overflow:hidden;margin-top:8px}
.bar>div{height:100%;background:linear-gradient(90deg,var(--green),var(--accent2))}
.tag{display:inline-block;margin-top:10px;margin-right:6px;padding:6px 9px;border-radius:999px;font-size:11px;font-weight:800}
.tag.blue{background:#172554;color:#bfdbfe}.tag.green{background:#052e16;color:#86efac}.tag.amber{background:#451a03;color:#fcd34d}.tag.red{background:#450a0a;color:#fca5a5}
.hidden{display:none}
@media (max-width:430px){.grid3{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.grid3 .field:last-child{grid-column:1 / -1}.title{font-size:34px}}
</style>
</head>
<body>
<div class="app">
<div class="title">競馬AI指数アプリ</div>
<div class="subtitle">公開予定版 v3 / レイアウト修正版。芝・ダート・障害 / 馬場状態も指数に反映。</div>

<div class="card">
<div class="section-title">レース設定</div>
<div class="grid2">
<div class="field"><div class="label">開催日</div><input id="raceDate" type="date" /></div>
<div class="field"><div class="label">競馬場</div><select id="racePlace"></select></div>
</div>
<div class="grid3" style="margin-top:10px">
<div class="field"><div class="label">レース番号</div><input id="raceNo" type="number" min="1" placeholder="例 1" /></div>
<div class="field"><div class="label">距離(m)</div><input id="raceDistance" type="number" placeholder="例 800" /></div>
<div class="field"><div class="label">クラス</div><input id="raceClass" type="text" placeholder="例 C3 / 3歳 / G3" /></div>
</div>
<div class="grid2" style="margin-top:10px">
<div class="field"><div class="label">コース種別</div><select id="surface"><option>ダート</option><option>芝</option><option>障害</option></select></div>
<div class="field"><div class="label">馬場状態</div><select id="track"><option>良</option><option>稍重</option><option>重</option><option>不良</option><option>稍重(芝)</option><option>重(芝)</option></select></div>
</div>
<div class="tips">競馬場枠の重なりを修正した版。</div>
</div>

<div class="card">
<div class="section-title">出走馬貼り付け</div>
<div class="note">1行に1頭で貼る。形式は <strong>馬番 馬名 人気 オッズ 斤量 休み明け日数</strong><br>例: <strong>1 シャコンヌ 3 4.7 0 0</strong></div>
<div style="margin-top:12px"><textarea id="pasteArea" placeholder="1 シャコンヌ 3 4.7 0 0&#10;2 シューバーダンス 8 17.6 0 0"></textarea></div>
<div class="btn-row"><button class="btn btn-primary" onclick="parseAndScore()">指数を計算</button><button class="btn btn-secondary" onclick="fillSample()">見本を入れる</button></div>
</div>

<div id="resultCard" class="card hidden">
<div class="section-title">指数結果</div>
<div class="kpis">
<div class="kpi"><div class="k">出走頭数</div><div id="kpiCount" class="v">-</div></div>
<div class="kpi"><div class="k">本命候補</div><div id="kpiTop" class="v" style="font-size:18px">-</div></div>
<div class="kpi"><div class="k">荒れ気配</div><div id="kpiChaos" class="v">-</div></div>
</div>
<div class="horse" style="margin-top:12px"><div class="name">おすすめ買い方</div><div id="betAdvice" class="muted" style="font-size:14px;color:#e2e8f0;margin-top:8px">-</div></div>
<div id="results"></div>
</div>
</div>

<script>
const places=['札幌','函館','福島','新潟','東京','中山','中京','京都','阪神','小倉','門別','盛岡','水沢','浦和','船橋','大井','川崎','金沢','笠松','名古屋','園田','姫路','高知','佐賀'];
function setupPlaces(){document.getElementById('racePlace').innerHTML=places.map(p=>`<option ${p==='浦和'?'selected':''}>${p}</option>`).join('');}
function n(v){const x=parseFloat(String(v).replace(/[^\d.\-]/g,''));return isNaN(x)?0:x;}
function fillSample(){document.getElementById('racePlace').value='浦和';document.getElementById('raceNo').value=1;document.getElementById('raceDistance').value=800;document.getElementById('raceClass').value='C3';document.getElementById('surface').value='ダート';document.getElementById('track').value='良';document.getElementById('pasteArea').value=`1 シャコンヌ 3 4.7 0 0
2 シューバーダンス 8 17.6 0 0
3 ヒノスマイ 4 6.8 0 0
4 シルバーペコ 7 17.0 0 0
5 ガールズドリーム 1 3.5 0 0`;}
function calcScore(pop,odds,weight,layoff,raceDistance,raceClass,surface,track){let s=50;s+=Math.max(0,22-pop*2.2);if(odds<=2)s+=8;else if(odds<=5)s+=12;else if(odds<=12)s+=16;else if(odds<=25)s+=12;else if(odds<=50)s+=7;else s+=3;if(weight>0){if(surface==='芝'){if(weight<=54)s+=4;else if(weight<=56)s+=2;else s-=1}else if(surface==='ダート'){if(weight<=50)s+=6;else if(weight<=53)s+=4;else if(weight<=55)s+=2;else s-=2}else{if(weight<=60)s+=2;else s-=1}}if(layoff>=150)s-=10;else if(layoff>=90)s-=6;else if(layoff>=30)s-=2;if(pop>=4&&pop<=7&&odds>=8&&odds<=35)s+=4;const dist=Number(raceDistance||0);if(surface==='ダート'){if(dist<=900)s+=2;if(track==='不良')s+=2;if(track==='重')s+=1}else if(surface==='芝'){if(dist>=1800)s+=1;if(track==='重(芝)'||track==='重')s-=1}else if(surface==='障害'){s-=2}if(String(raceClass).includes('C3'))s+=1;return Math.max(1,Math.round(s));}
function judgeTag(h,topScore){if(h.layoff>=150)return ['休み明け注意','red'];if(h.pop===1&&h.score>=70)return ['本命候補','green'];if(h.pop<=3&&h.score>=topScore-5)return ['相手本線','blue'];if(h.pop>=4&&h.odds>=8&&h.odds<=35&&h.score>=62)return ['穴候補','amber'];return ['押さえ','blue'];}
function buildSummary(arr,surface,track){const top=arr[0],spread=top.score-arr[Math.min(arr.length-1,4)].score;let chaos='中';if(spread<=6)chaos='高';if(spread>=14)chaos='低';if(surface==='ダート'&&(track==='重'||track==='不良'))chaos=chaos==='低'?'中':'高';if(surface==='障害')chaos='高';let bet='3連複軸1頭 or 3連単2・3着流し向き';if(chaos==='高')bet='3連複BOX or 3連単フォーメーションで穴3着待ち向き';if(chaos==='低'&&top.pop===1)bet='1頭軸フォーメーション向き';return {count:arr.length,topName:`${top.no}.${top.name}`,chaos,bet};}
function parseAndScore(){const text=document.getElementById('pasteArea').value.trim();if(!text){alert('出走馬を貼って');return;}const raceDistance=document.getElementById('raceDistance').value;const raceClass=document.getElementById('raceClass').value;const surface=document.getElementById('surface').value;const track=document.getElementById('track').value;const arr=[];text.split(/\n+/).map(v=>v.trim()).filter(Boolean).forEach(line=>{const tokens=line.split(/\s+/);if(tokens.length<5)return;const no=n(tokens[0]);const rest=tokens.slice(1);const layoff=n(rest[rest.length-1]);const weight=n(rest[rest.length-2]);const odds=n(rest[rest.length-3]);const pop=n(rest[rest.length-4]);const name=rest.slice(0,rest.length-4).join(' ')||('馬番'+no);const score=calcScore(pop,odds,weight,layoff,raceDistance,raceClass,surface,track);arr.push({no,name,pop,odds,weight,layoff,score});});if(!arr.length){alert('読み取れなかった');return;}arr.sort((a,b)=>b.score-a.score);const summary=buildSummary(arr,surface,track);document.getElementById('resultCard').classList.remove('hidden');document.getElementById('kpiCount').textContent=summary.count;document.getElementById('kpiTop').textContent=summary.topName;document.getElementById('kpiChaos').textContent=summary.chaos;document.getElementById('betAdvice').textContent=summary.bet;const topScore=arr[0].score;const results=document.getElementById('results');results.innerHTML='';arr.forEach((h,i)=>{const [label,color]=judgeTag(h,topScore);const div=document.createElement('div');div.className='horse';div.innerHTML=`<div class="name">${i+1}位 ${h.no}. ${h.name}</div><div class="muted">人気 ${h.pop} / 単勝 ${h.odds} / 斤量 ${h.weight} / 休み明け ${h.layoff}日</div><div class="score">${h.score}</div><div class="bar"><div style="width:${Math.max(6,Math.min(100,h.score))}%"></div></div><span class="tag ${color}">${label}</span>`;results.appendChild(div);});document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});}
setupPlaces();
</script>
</body>
</html>
