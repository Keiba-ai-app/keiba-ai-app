<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競馬AI V6.9.8 - シンプル表示特化型</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0; padding:20px; background:#0b1120;">
<div style="background-color: #0d1a2d; color: #fff; font-family: sans-serif; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; border: 1px solid #1e3a8a;">

  <div style="background: linear-gradient(90deg, #1e40af 0%, #7f1d1d 100%); padding: 10px; text-align: center; border-radius: 5px; font-weight: bold; margin-bottom: 15px;">
    競馬AI V6.9.8 - シンプル表示特化型
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
    <div>
      <label style="font-size: 11px; color: #94a3b8;">競馬場</label>
      <select id="selCourse" style="width: 100%; padding: 10px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 5px;">
        <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
        <option value="京都">京都</option><option value="大井">大井</option><option value="船橋">船橋</option><option value="高知">高知</option>
      </select>
    </div>
    <div>
      <label style="font-size: 11px; color: #94a3b8;">距離(m) 手入力</label>
      <input id="inDist" type="text" placeholder="1200" style="width: 100%; padding: 10px; background: #fff; color: #000; border: none; border-radius: 5px; box-sizing: border-box; font-weight: bold;">
    </div>
    <div>
      <label style="font-size: 11px; color: #94a3b8;">馬場</label>
      <select id="selCond" style="width: 100%; padding: 10px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 5px;">
        <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
      </select>
    </div>
    <div>
      <label style="font-size: 11px; color: #94a3b8;">回り</label>
      <select id="selDir" style="width: 100%; padding: 10px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 5px;">
        <option value="右回り">右回り</option><option value="左回り">左回り</option>
      </select>
    </div>
  </div>

  <div style="background: #1e293b; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #1e40af;">
    <input type="checkbox" id="chkAnti"> <label for="chkAnti" style="font-weight: bold; font-size: 14px;">1人気消し</label>
    <input type="checkbox" id="chkW" style="margin-left:15px;"> <label for="chkW" style="font-weight: bold; font-size: 14px;">W軸</label>
  </div>

  <textarea id="rawGrid" style="width: 100%; height: 100px; background: #0f172a; color: #fff; border: 1px solid #1e40af; border-radius: 5px; padding: 10px; margin-bottom: 15px; box-sizing: border-box;" placeholder="データを貼り付け"></textarea>

  <button type="button" onclick="fnV6Simple()" style="width: 100%; padding: 15px; background: #f59e0b; color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor:pointer; margin-bottom: 20px;">
    分析・買い目生成
  </button>

  <div style="font-size: 14px; color: #3b82f6; margin-bottom: 5px; font-weight: bold;">📊 指数・断層</div>
  <div id="v6Analysis" style="background: #1e293b; padding: 10px; border-radius: 5px; border: 1px solid #1e40af; margin-bottom: 20px;"></div>

  <div style="font-size: 14px; color: #ef4444; margin-bottom: 5px; font-weight: bold;">💰 買い目（推奨5〜7頭）</div>
  <div id="v6BetArea" style="background: #1e293b; padding: 15px; border-radius: 5px; border: 1px solid #1e40af;"></div>

</div>

<script>
window.fnV6Simple = function() {
  var area = document.getElementById('rawGrid');
  if(!area || !area.value) return;
  var lines = area.value.split('\n').filter(l => l.trim() !== '');
  var list = lines.map(line => {
    var d = line.split('\t');
    var s = parseFloat(d[4]) || 0;
    var o = parseFloat(d[3]) || 0;
    var txt = (d[1]||'') + (d[5]||'');
    if(document.getElementById('inDist').value && txt.includes(document.getElementById('inDist').value)) s += 5;
    if(document.getElementById('selCond').value && txt.includes(document.getElementById('selCond').value)) s += 5;
    if(document.getElementById('selCourse').value && txt.includes(document.getElementById('selCourse').value)) s += 5;
    if(document.getElementById('selDir').value && txt.includes(document.getElementById('selDir').value)) s += 5;
    return { no: d[0], name: d[1], pop: parseInt(d[2])||99, odds: o, score: s };
  });
  list.sort((a,b) => b.score - a.score);

  var jiku = document.getElementById('chkAnti').checked ? list.filter(r => r.pop !== 1)[0] : list[0];
  if (!jiku) jiku = list[0];
  var aite = list.filter(r => r.no !== jiku.no);
  var topAite = aite.slice(0, 6);
  var hNames = topAite.map(h => h.no + ' ' + h.name);
  var hNos = topAite.map(h => h.no);
  var first = document.getElementById('chkW').checked && aite[0] ? jiku.no + ',' + aite[0].no : jiku.no;

  document.getElementById('v6BetArea').innerHTML = 
    '<div style="margin-bottom:15px;"><b>【3連単マルチ】</b><br>軸: ' + jiku.no + ' ' + jiku.name + '<br>↔ 相手: ' + hNames.join('、') + '</div>' +
    '<div><b>【3連単F】</b><br>' + first + ' → ' + hNos.join(',') + ' → 全</div>';

  var maxS = Math.max(...list.map(d => d.score));
  document.getElementById('v6Analysis').innerHTML = list.slice(0, 10).map((r, i) => {
    var gap = (i < list.length-1 && r.odds > 0) ? (list[i+1].odds / r.odds).toFixed(1) : 1;
    return '<div style="margin-bottom:10px;">' +
      '<div style="display:flex; justify-content:space-between; font-size:12px;"><span>' + (i+1) + '.' + r.no + ' ' + r.name + '</span><span>' + r.score.toFixed(1) + 'pt</span></div>' +
      '<div style="width:100%; height:8px; background:#0f172a; border-radius:4px; margin-top:2px;">' +
      '<div style="width:'+(maxS ? (r.score/maxS*100) : 0)+'%; height:100%; background:#3b82f6; border-radius:4px;"></div></div>' +
      (gap >= 1.5 ? '<div style="color:#ef4444; font-size:10px; text-align:right; font-weight:bold;">▲断層 ' + gap + '倍</div>' : '') +
      '</div>';
  }).join('');
};
</script>
</body>
</html>
