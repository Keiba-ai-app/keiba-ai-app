<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V7.0.1 タグボタン連動版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px}
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V7.0.1 - タグボタン連動版</div>

  <div class="card">
    <div style="background:#222; padding:10px; border-radius:10px; margin-bottom:10px;">
      <div style="display:flex; gap:5px; margin-bottom:8px;">
        <button id="btnLeft" onclick="toggleTag('左')" style="flex:1; padding:8px; border:none; border-radius:5px;">左回り</button>
        <button id="btnRight" onclick="toggleTag('右')" style="flex:1; padding:8px; border:none; border-radius:5px;">右回り</button>
        <button id="btnSlope" onclick="toggleTag('坂')" style="flex:1; padding:8px; border:none; border-radius:5px;">急坂</button>
      </div>
      <div style="display:flex; gap:5px; margin-bottom:8px;">
        <button id="btnHeavy" onclick="toggleTag('重')" style="flex:1; padding:8px; border:none; border-radius:5px;">重/渋</button>
        <button id="btnRough" onclick="toggleTag('荒')" style="flex:1; padding:8px; border:none; border-radius:5px;">荒馬場</button>
        <button id="btnAnti" onclick="toggleAnti()" style="flex:1; padding:8px; border:none; border-radius:5px;">1人気消し</button>
      </div>
      <button id="btnDouble" onclick="toggleDouble()" style="width:100%; padding:10px; border:none; border-radius:5px; background:#444; color:#fff;">1着2頭(W軸) 切り替え</button>
    </div>

    <label style="display:block;font-size:12px;color:#cbd5e1;margin-bottom:6px;">入力（タブ区切り: 馬番 馬名 人気 オッズ スコア 詳細）</label>
    <textarea id="rawGrid" rows="8" placeholder="1	馬名	3	5.2	72	右回り得意"></textarea>
    <button class="exec" onclick="calc()">分析実行</button>
  </div>

  <div class="card">
    <div class="title">💰 買い目</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📋 ランキング</div>
    <div id="horseList" style="font-size:14px"></div>
  </div>
</div>

<script>
let activeTags = [];
let antiFav = false;
let doubleJiku = false;

// ボタン連動関数
function toggleTag(tag) {
  if(activeTags.includes(tag)) activeTags = activeTags.filter(t => t !== tag);
  else activeTags.push(tag);
  updateBtnStyle();
  calc();
}

function updateBtnStyle() {
  const mapping = {'左':'btnLeft','右':'btnRight','坂':'btnSlope','重':'btnHeavy','荒':'btnRough'};
  for(let t in mapping) {
    const btn = document.getElementById(mapping[t]);
    btn.style.background = activeTags.includes(t) ? '#10b981' : '#444';
    btn.style.color = '#fff';
  }
}

function toggleAnti() {
  antiFav = !antiFav;
  document.getElementById('btnAnti').style.background = antiFav ? '#ef4444' : '#444';
  calc();
}

function toggleDouble() {
  doubleJiku = !doubleJiku;
  document.getElementById('btnDouble').style.background = doubleJiku ? '#f59e0b' : '#444';
  calc();
}

const $ = (id) => document.getElementById(id);
const n = (v) => parseFloat(v) || 0;

function calc() {
  const input = $('rawGrid').value;
  if(!input) return;

  const lines = input.split('\n').filter(l => l.trim());
  let allRows = lines.map(line => {
    const d = line.split('\t');
    let score = n(d[4]);
    let detail = (d[1] || "") + (d[5] || "");

    // 【選択ボタンとの連動】選んだタグが含まれていればスコア加算
    activeTags.forEach(tag => {
      if(detail.includes(tag)) score += 5; // 1項目につき+5点
    });

    return { no: d[0], name: d[1], pop: n(d[2]), odds: n(d[3]), score: score, detail: detail };
  }).filter(r => r.no && r.name);

  if(allRows.length === 0) return;

  // 18頭ソート
  let rankRows = [...allRows].sort((a,b) => b.score - a.score);
  let jiku = antiFav ? rankRows.filter(r => r.pop !== 1)[0] : rankRows[0];
  if(!jiku) jiku = rankRows[0];
  let aiteList = rankRows.filter(r => r.no !== jiku.no);

  // 推奨7頭
  let honsen5 = aiteList.slice(0, 5);
  let fukuhei2 = aiteList.slice(5).filter((r) => {
    let gIdx = rankRows.findIndex(x => x.no === r.no);
    return ((gIdx > 0) && (rankRows[gIdx-1].score - r.score > 8)) || (gIdx >= 10 && r.score > 40);
  }).slice(0, 2);

  const honsenNos = honsen5.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const combined = [...honsenNos, ...fukuhei2.map(a=>a.no)].sort((x,y)=>n(x)-n(y));
  let firstRow = (doubleJiku && aiteList[0]) ? [jiku.no, aiteList[0].no].sort((a,b)=>n(a)-n(b)).join(',') : jiku.no;

  // 買い目表示
  if($('bet3tanM')) $('bet3tanM').innerHTML = `<b>【3連単マルチ 60点】</b><br>軸: ${jiku.no} ↔ 相手: ${honsenNos.join(', ')}`;
  if($('bet3tanF')) $('bet3tanF').innerHTML = `<b>3連単F (${doubleJiku?'W軸':'1軸'})</b><br>${firstRow} → ${combined.join(',')} → 18頭全網羅`;

  // リスト表示
  if($('horseList') || $('ranking')) {
    let target = $('horseList') || $('ranking');
    let html = "";
    rankRows.forEach((r, i) => {
      let isAna = fukuhei2.some(f => f.no === r.no);
      html += `<div style="padding:4px; border-bottom:1px solid #333; color:${isAna?'#ef4444':'#fff'}">
        ${i+1}位: ${r.no} ${r.name} (${r.score.toFixed(1)}pt)${isAna?' !!伏兵!!':''}
      </div>`;
    });
    target.innerHTML = html;
  }
}
// 初期表示用
updateBtnStyle();
</script>
</body>
</html>
