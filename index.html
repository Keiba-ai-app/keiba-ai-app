<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI 推奨V2.0 - 軸除外ロジック適正化版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.banner{background:#7c2d12;border-radius:14px;padding:12px;font-weight:900;margin-bottom:14px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:16px}
.title{font-size:20px;font-weight:900;margin-bottom:12px;color:#f59e0b}
.row{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:10px}
.box{background:#071225;border:1px solid #233252;border-radius:12px;padding:10px}
.v_bet{font-size:18px;color:#f59e0b;font-family:monospace;letter-spacing:1px;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;background:#000;padding:8px;border-radius:8px}
label{display:block;font-size:12px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:10px;font-size:16px}
textarea{min-height:100px}
button{width:100%;border:none;border-radius:12px;padding:18px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;cursor:pointer;margin-top:10px}
.strategy-note{background:#1e293b;padding:10px;border-radius:12px;margin-bottom:10px;font-size:13px;border-left:4px solid #3b82f6}
.gap-mark{color:#ef4444;font-weight:bold;margin-left:5px}
.barwrap{display:flex;align-items:center;gap:8px;margin:8px 0}
.barlabel{width:130px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barbg{flex:1;height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #3b82f6, #60a5fa)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V2.0 - 軸のみ除外・距離連動修正</div>

  <div class="card">
    <div class="row">
      <div><label>競馬場</label><select id="track">
        <optgroup label="JRA"><option>中山</option><option>東京</option><option>京都</option><option>阪神</option><option>中京</option><option>新潟</option><option>福島</option><option>小倉</option><option>札幌</option><option>函館</option></optgroup>
        <optgroup label="地方"><option selected>大井</option><option>船橋</option><option>川崎</option><option>浦和</option><option>門別</option><option>盛岡</option><option>水沢</option><option>金沢</option><option>笠松</option><option>名古屋</option><option>園田</option><option>姫路</option><option>高知</option><option>佐賀</option></optgroup>
      </select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1400" step="100"></div>
      <div style="display:flex;align-items:center;padding-top:18px">
        <input type="checkbox" id="antiFav" style="width:24px;height:24px;margin-right:8px"><label for="antiFav" style="margin:0;color:#ef4444;font-size:14px;font-weight:bold">1人気を軸から外す</label>
      </div>
    </div>
    <textarea id="pasteArea" placeholder="馬番 名前 人気 オッズ..."></textarea>
    <button onclick="calc()">分析・買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 厳選推奨 (馬番.名前)</div>
    <div class="row">
      <div class="box"><label>推奨1(軸)</label><div id="rec1" style="font-weight:900">-</div></div>
      <div class="box"><label>推奨2</label><div id="rec2" style="font-weight:900">-</div></div>
      <div class="box"><label>推奨3</label><div id="rec3" style="font-weight:900">-</div></div>
      <div class="box" style="border:1px solid #ef4444"><label style="color:#ef4444">★大穴推奨</label><div id="darkHorse" style="font-weight:900;color:#fbbf24">-</div></div>
    </div>
  </div>

  <div id="strategy" class="strategy-note">条件を設定して分析してください。</div>

  <div class="card">
    <div class="title">💰 AI推奨買い目</div>
    <div class="box" style="margin-bottom:10px"><label>3連複F (的中重視)</label><div id="bet3puku" class="v_bet">-</div></div>
    <div class="box" style="margin-bottom:10px"><label>3連単マルチ (爆発重視)</label><div id="bet3tanM" class="v_bet">-</div></div>
    <div class="box"><label>3連単F (高配当狙い)</label><div id="bet3tanF" class="v_bet">-</div></div>
  </div>

  <div class="card">
    <div class="title">📊 指数分布 (上位10頭)</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.]/g,'')) || 0; }
function unique(arr){ return [...new Set(arr.filter(v => v !== undefined && v !== ''))].sort((a,b)=>n(a)-n(b)); }

function calc(){
  const lines = $('pasteArea').value.split('\n').filter(Boolean);
  let rows = [];
  lines.forEach(line => {
    const m = line.match(/^(\d+)\s+(.+?)\s+(\d+)\s+([0-9.]+)\s+/);
    if(m) rows.push({no:m[1], name:m[2], pop:n(m[3]), odds:n(m[4]), score:0, isGap:false});
  });

  if(rows.length < 6) return alert('馬のデータが足りません');

  const cond = $('cond').value;
  const dist = n($('distance').value);
  const isRough = (cond === '重' || cond === '不良');

  rows.forEach(r => {
    r.score = (25 - r.pop) + (r.odds < 10 ? 10 : 5);
    if(dist <= 1200 && n(r.no) <= 6) r.score += 5;
    if(dist >= 1800 && r.pop >= 4) r.score += 3;
    if(isRough && r.pop >= 7) r.score += 8;
  });

  const sortedOdds = [...rows].sort((a,b)=>a.odds - b.odds);
  for(let i=1; i<sortedOdds.length; i++){
    if(sortedOdds[i].odds / sortedOdds[i-1].odds > 1.6) {
      let target = rows.find(r => r.no === sortedOdds[i].no);
      if(target) target.isGap = true;
    }
  }

  const antiFavChecked = $('antiFav').checked;
  if(antiFavChecked) {
    rows.forEach(r => { if(r.pop === 1) r.score -= 15; });
  }

  rows.sort((a,b)=>b.score - a.score);

  const r1 = rows[0], r2 = rows[1], r3 = rows[2];
  const dh = rows.find(r => r.pop >= 7 && (r.isGap || isRough)) || rows[7] || rows[5];

  $('rec1').textContent = r1.no+'.'+r1.name;
  $('rec2').textContent = r2.no+'.'+r2.name;
  $('rec3').textContent = r3.no+'.'+r3.name;
  $('darkHorse').textContent = dh.no+'.'+dh.name;

  const top10 = rows.slice(0,10).map(r=>r.no);
  const aite = unique([r2.no, r3.no, rows[3]?.no, rows[4]?.no]);

  if(isRough){
    $('strategy').textContent = `【波乱警戒】${dist}m / ${cond}。穴馬${dh.no}を重視。3列目全通り。`;
    $('bet3puku').textContent = `${r1.no} - ${unique([r2.no, r3.no, dh.no]).join(',')} - 全通り`;
    $('bet3tanM').textContent = `軸:${r1.no}\n相手:${unique([...aite.slice(0,3), dh.no]).join(',')} (36点)`;
    $('bet3tanF').textContent = `${r1.no},${r2.no} → ${unique([r2.no, r3.no, dh.no]).join(',')} → 全通り`;
  } else {
    $('strategy').textContent = `【標準構成】${dist}m / ${cond}。10頭BOXベースの構成。`;
    $('bet3puku').textContent = `${r1.no} - ${aite.join(',')} - ${top10.join(',')}`;
    $('bet3tanM').textContent = `軸:${r1.no}\n相手:${aite.join(',')} (36点)`;
    $('bet3tanF').textContent = `${r1.no} → ${unique([r2.no, r3.no]).join(',')} → ${top10.join(',')}`;
  }

  let gHtml = '';
  rows.slice(0,10).forEach(r => {
    const w = (r.score / rows[0].score) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel">${r.no}.${r.name}${r.isGap?'!!':''}</div><div class="barbg"><div class="barfill" style="width:${Math.max(w,0)}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
