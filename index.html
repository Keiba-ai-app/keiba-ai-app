<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI V4.0 - 脚質・展開攻略版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:12px}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:14px;padding:12px;font-weight:900;margin-bottom:12px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:12px}
.title{font-size:17px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:10px}
.box{background:#071225;border:1px solid #233252;border-radius:12px;padding:10px}
.v_bet{font-size:16px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:10px;border-radius:8px;margin-top:5px;line-height:1.4}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:10px;font-size:16px}
button{width:100%;border:none;border-radius:12px;padding:18px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;cursor:pointer;margin-top:8px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px}
.b-idx{background:#1e40af} .b-gap{background:#7c2d12} .b-wak{background:#065f46} .b-bad{background:#b91c1c}
.style-tag{font-size:10px;padding:2px 4px;border-radius:4px;margin-right:4px;background:#334155}
.s-nige{background:#b91c1c} .s-sashi{background:#1e40af}
.fukuhei{border:1px dashed #f59e0b;padding:8px;border-radius:8px;margin-top:10px;background:rgba(245,158,11,0.05)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V4.0 - 脚質判定・自動軸選定</div>

  <div class="card">
    <div class="row">
      <div><label>競馬場</label><select id="track">
        <optgroup label="JRA"><option>中京</option><option>中山</option><option>東京</option><option>阪神</option><option>京都</option></optgroup>
        <optgroup label="地方"><option selected>大井</option><option>船橋</option><option>川崎</option><option>浦和</option></optgroup>
      </select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>種別</label><select id="surf"><option value="ダ">ダート</option><option value="芝">芝</option></select></div>
      <div><label>回り</label><select id="rot"><option value="右">右回り</option><option value="左">左回り</option></select></div>
    </div>
    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
      <div><label>相手設定</label><select id="aiteNum"><option value="5" selected>推奨5頭 (60点)</option><option value="4">絞り4頭 (36点)</option></select></div>
    </div>
    <div style="margin-bottom:10px"><input type="checkbox" id="antiFav"> <label style="display:inline;color:#ef4444;font-size:14px;font-weight:bold">1人気を軸から外す</label></div>
    <textarea id="pasteArea" rows="4" placeholder="馬番 名前 人気 オッズ 脚質(逃/先/差/追) 増減"></textarea>
    <button onclick="calc()">全分析・買い目生成実行</button>
  </div>

  <div class="card">
    <div class="title">🎯 展開予測と軸推奨</div>
    <div id="tenkaiArea" style="font-size:13px;color:#cbd5e1;margin-bottom:10px"></div>
    <div id="reasonArea" style="font-size:14px"></div>
    <div id="fukuheiArea" class="fukuhei"></div>
  </div>

  <div class="card">
    <div class="title">💰 3連単 (マルチ・フォーメーション)</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">💴 3連複 (フォーメーション)</div>
    <div id="bet3pukuF" class="v_bet">-</div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function calc(){
  const lines = $('pasteArea').value.split('\\n').filter(Boolean);
  let rows = [];
  lines.forEach(line => {
    const p = line.split(/\\s+/);
    let style = "不明";
    if(line.includes("逃")) style = "逃げ";
    else if(line.includes("先")) style = "先行";
    else if(line.includes("差")) style = "差し";
    else if(line.includes("追")) style = "追込";

    if(p.length >= 4) {
      rows.push({
        no: p[0], name: p[1], pop: n(p[2]), odds: n(p[3]), style: style, weightChange: n(p[p.length-1]),
        score: 0, reasons: [], skipReason: "", isGap: false
      });
    }
  });

  if(rows.length < 5) return alert('データを入力してください');

  const nigeCount = rows.filter(r => r.style === "逃げ").length;
  const isHighPace = nigeCount >= 3;
  const dist = n($('distance').value);
  const isRough = ($('cond').value === '重' || $('cond').value === '不良');

  rows.forEach(r => {
    r.score = (25 - r.pop) + (r.odds < 10 ? 15 : 5);
    r.reasons.push('<span class="badge b-idx">指数</span>');

    if(isHighPace && (r.style === "差し" || r.style === "先行")) {
      r.score += 12; r.reasons.push('<span class="badge b-bad">展開利</span>');
    } else if(!isHighPace && r.style === "逃げ") {
      r.score += 10; r.reasons.push('<span class="badge b-wak">単騎逃</span>');
    }

    if(dist <= 1300 && n(r.no) <= 4) { r.score += 7; r.reasons.push('<span class="badge b-wak">枠利</span>'); }
    if(isRough && r.pop >= 6) { r.score += 8; r.reasons.push('<span class="badge b-bad">馬場</span>'); }

    const sorted = [...rows].sort((a,b)=>a.odds - b.odds);
    let idx = sorted.findIndex(s => s.no === r.no);
    if(idx > 0 && sorted[idx].odds / sorted[idx-1].odds > 1.6) { r.score += 10; r.isGap = true; r.reasons.push('<span class="badge b-gap">断層</span>'); }

    if($('antiFav').checked && r.pop === 1) { r.score -= 45; r.skipReason = "1人気除外"; }
    if(Math.abs(r.weightChange) >= 12) { r.score -= 15; r.skipReason = `体重(${r.weightChange}kg)`; }
  });

  rows.sort((a,b)=>b.score - a.score);

  let jikuIndex = 0;
  if(isHighPace) {
    const sashiUma = rows.slice(0, 5).findIndex(r => r.style === "差し" || r.style === "先行");
    if(sashiUma !== -1) jikuIndex = sashiUma;
  }
  const r1 = rows[jikuIndex];
  rows.splice(jikuIndex, 1);
  rows.unshift(r1);

  const aiteCnt = n($('aiteNum').value);
  const aiteList = rows.slice(1, aiteCnt + 1);
  const aiteNos = aiteList.map(a=>a.no).sort((x,y)=>n(x)-n(y));

  $('tenkaiArea').innerHTML = `逃げ馬: ${nigeCount}頭 / 予測: ${isHighPace?'【ハイペース・差し有利】':'【スロー〜平均・前残り注意】'}`;

  let resHtml = "";
  rows.slice(0, aiteCnt + 1).forEach((r, i) => {
    const sClass = r.style === "逃げ" ? "s-nige" : (r.style === "差し" ? "s-sashi" : "");
    resHtml += `<div style="margin-bottom:6px"><span class="style-tag ${sClass}">${r.style}</span><b>${i==0?'【軸】':'【相】'}${r.no}.${r.name}</b> ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  const mTen = (aiteCnt === 5) ? 60 : 36;
  $('bet3tanM').innerHTML = `<small>3連単マルチ (${mTen}点)</small><br>軸: ${r1.no} / 相手: ${aiteNos.join(',')}`;

  const fTen = (aiteCnt === 5) ? 20 : 12;
  $('bet3tanF').innerHTML = `<small>3連単F(1着固定) (${fTen}点)</small><br>1着: ${r1.no} / 2,3着: ${aiteNos.join(',')}`;

  const pTen = (aiteCnt === 5) ? 10 : 6;
  $('bet3pukuF').innerHTML = `<small>3連複F (${pTen}点)</small><br>${r1.no} － ${rows[1].no},${rows[2].no} － ${aiteNos.join(',')}`;

  const fukuheiCandidates = rows.slice(aiteCnt + 1).filter(r => r.isGap || (isRough && r.pop >= 8)).slice(0, 2);
  let fHtml = "<b>💡 伏兵候補:</b><br>";
  if(fukuheiCandidates.length > 0) {
    fukuheiCandidates.forEach(f => { fHtml += `${f.no}.${f.name} (${f.style}) / `; });
  } else { fHtml += "特になし"; }
  $('fukuheiArea').innerHTML = fHtml;
}
</script>
</body>
</html>
