<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V7.0.1 入力セレクト版 v2</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V7.0.1 - 入力セレクト版 v2</div>

  <div class="card">
    <div style="background:#111; padding:12px; border:2px solid #444; color:#fff; border-radius:10px;">
      <div style="margin-bottom:10px;">
        <input id="inDist" type="text" placeholder="距離を入力 (例: 1200)" style="width:100%; padding:12px; background:#333; color:#fff; border:1px solid #555; margin-bottom:8px; border-radius:5px;">

        <div style="display:flex; gap:5px;">
          <select id="selCond" style="flex:1; padding:10px; background:#333; color:#fff; border:1px solid #555;">
            <option value="">馬場状態</option>
            <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
          </select>
          <select id="selCourse" style="flex:1; padding:10px; background:#333; color:#fff; border:1px solid #555;">
            <option value="">競馬場</option>
            <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
          </select>
          <select id="selDir" style="flex:1; padding:10px; background:#333; color:#fff; border:1px solid #555;">
            <option value="">回り</option><option value="左">左回り</option><option value="右">右回り</option>
          </select>
        </div>
      </div>

      <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button onclick="toggleAnti()" id="btnAnti" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:5px; font-weight:bold;">1人気消し</button>
        <button onclick="toggleW()" id="btnW" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:5px; font-weight:bold;">W軸(1着2頭)</button>
      </div>

      <button onclick="calc()" style="width:100%; padding:15px; background:#3b82f6; color:#fff; border:none; border-radius:5px; font-weight:bold; font-size:18px;">🔥 分析実行</button>
    </div>

    <label style="display:block;font-size:12px;color:#cbd5e1;margin:10px 0 6px;">入力（タブ区切り: 馬番 馬名 人気 オッズ スコア 詳細）</label>
    <textarea id="rawGrid" rows="8" placeholder="1	馬名	3	5.2	72	中京 左 良 1200"></textarea>
  </div>

  <div class="card">
    <div class="title">💰 買い目</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📋 ランキング</div>
    <div id="horseList" style="font-size:14px"></div>
  </div>
</div>

<script>
let isAnti = false;
let isW = false;

function toggleAnti() { isAnti = !isAnti; document.getElementById('btnAnti').style.background = isAnti ? '#ef4444' : '#444'; calc(); }
function toggleW() { isW = !isW; document.getElementById('btnW').style.background = isW ? '#f59e0b' : '#444'; calc(); }

const $ = (id) => document.getElementById(id);

function calc() {
  const input = $('rawGrid').value;
  if(!input) return;

  const lines = input.split('\n').filter(l => l.trim());
  let data = lines.map(line => {
    const d = line.split('\t');
    let score = parseFloat(d[4]) || 0;
    let detail = (d[1] || "") + (d[5] || "");

    // 入力・選択値による補正（各+5pt）
    if($('inDist').value && detail.includes($('inDist').value)) score += 5;
    if($('selCond').value && detail.includes($('selCond').value)) score += 5;
    if($('selCourse').value && detail.includes($('selCourse').value)) score += 5;
    if($('selDir').value && detail.includes($('selDir').value)) score += 5;

    return { no: d[0], name: d[1], pop: parseInt(d[2]) || 99, score: score };
  }).filter(r => r.no && r.name);

  if (data.length === 0) return;

  // スコア順に並び替え
  data.sort((a,b) => b.score - a.score);

  // 軸選定（1人気消し対応）
  let jiku = isAnti ? data.filter(r => r.pop !== 1)[0] : data[0];
  if(!jiku) jiku = data[0];
  let aiteAll = data.filter(r => r.no !== jiku.no);

  // 推奨7頭（本線5 + 伏兵2）
  let h5 = aiteAll.slice(0, 5);
  let f2 = aiteAll.slice(5).filter((r) => {
    let idx = data.findIndex(x => x.no === r.no);
    return ((idx > 0) && (data[idx-1].score - r.score > 8)) || (idx >= 10 && r.score > 40);
  }).slice(0, 2);

  let hNos = h5.map(h => h.no).sort((a,b) => a-b);
  let combined = [...new Set([...hNos, ...f2.map(f => f.no)])].sort((a,b) => a-b);

  // W軸(1着2頭)
  let first = (isW && aiteAll[0]) ? [jiku.no, aiteAll[0].no].sort((a,b)=>a-b).join(',') : jiku.no;

  // 買い目・リスト表示
  if($('bet3tanM')) $('bet3tanM').innerHTML = `<b>【3連単マルチ】</b>軸 ${jiku.no} ↔ 相手 ${hNos.join(', ')}`;
  if($('bet3tanF')) $('bet3tanF').innerHTML = `<b>【3連単F】</b>${first} → ${combined.join(',')} → 18頭全網羅`;
  if($('bet3pukuF')) $('bet3pukuF').innerHTML = `<b>【3連複F】</b>${first} / ${combined.join(',')} / 全網羅`;

  let list = $('horseList') || $('ranking');
  if(list) {
    list.innerHTML = data.map((r, i) => {
      let ana = f2.some(f => f.no === r.no);
      return `<div style="color:${ana?'#ef4444':'#fff'}">${i+1}位: ${r.no} (${r.score.toFixed(1)}pt)${ana?' !!':''}</div>`;
    }).join('');
  }
}
</script>
</body>
</html>
