<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V6.3 - 真・連動版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px;box-sizing:border-box}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.row > div{flex:1}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155;word-break:break-all}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px;appearance:none}
.anti-fav-btn {
  display: flex; align-items: center; justify-content: center;
  background: #1e293b; border: 2px solid #3b82f6; border-radius: 12px;
  padding: 15px; margin-bottom: 12px; cursor: pointer;
}
.anti-fav-btn.active { background: #1d4ed8; border-color: #60a5fa; }
.anti-fav-btn input { display: none; }
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309;margin-top:5px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px}
.b-dansou{background:#2563eb} .b-power{background:#dc2626} .b-ninki{background:#059669}
.barwrap{margin:12px 0} .barlabel{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease-out;}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V6.3</div>

  <div class="card">
    <div class="anti-fav-btn" id="favBtn" onclick="toggleFav()">
      <input type="checkbox" id="antiFav">
      <span class="anti-fav-text" id="favText" style="font-weight:900">⬜️ 1番人気を【軸から外して相手へ】</span>
    </div>

    <div class="row">
      <div><label>競馬場</label><select id="track"><option>大井</option><option>船橋</option><option>川崎</option><option>浦和</option><option>中山</option><option>中京</option></select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重" selected>重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>種別</label><select id="surf"><option value="ダ" selected>ダート</option><option value="芝">芝</option></select></div>
      <div><label>相手頭数</label><select id="aiteNum"><option value="5" selected>5頭</option><option value="6">6頭</option></select></div>
    </div>
    <textarea id="pasteArea" rows="5" placeholder="ここにデータを貼り付けてください"></textarea>
    <button class="exec" onclick="calc()">全分析・買い目生成実行</button>
  </div>

  <div class="card">
    <div class="title">🎯 判定結果 (1人気は相手に配置)</div>
    <div id="tenkaiArea" style="font-size:12px;color:#cbd5e1;margin-bottom:8px"></div>
    <div id="reasonArea" style="font-size:14px"></div>
  </div>

  <div class="card">
    <div class="title">💰 買い目 (完全連動)</div>
    <div id="bet3tanM" class="v_bet"></div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px"></div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px"></div>
  </div>

  <div class="card">
    <div class="title">📊 スコア分布</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function toggleFav(){
  const cb = $('antiFav'); const btn = $('favBtn'); const txt = $('favText');
  cb.checked = !cb.checked;
  btn.classList.toggle('active', cb.checked);
  txt.innerHTML = cb.checked ? "✅ 1人気を【相手(2・3着)に固定中】" : "⬜️ 1番人気を【軸から外して相手へ】";
}

function calc(){
  const inputData = $('pasteArea').value.trim();
  if(!inputData) return alert('データを貼り付けてください');
  const lines = inputData.split('\n').filter(l => l.trim().length > 5);
  let allRows = [];

  lines.forEach(line => {
    const p = line.trim().split(/\s+/);
    if(p.length < 3) return;
    const nums = p.map(x => n(x)).filter(x => !isNaN(x));
    const weightMatch = line.match(/(\d{3})\(/);
    allRows.push({
      no: p[0], name: p[1], pop: nums[1] || 99, odds: nums[2] || 99,
      weight: weightMatch ? n(weightMatch[1]) : 480, score: 0, reasons: []
    });
  });

  if (allRows.length < 3) return alert('データが足りません');

  const isDirt = ($('surf').value === 'ダ');
  const isRough = ($('cond').value !== '良');
  const antiFav = $('antiFav').checked;

  allRows.forEach(r => {
    r.score = (75 / (r.pop + 0.5)) + (35 / Math.log10(r.odds + 2));
    r.reasons = ['<span class="badge b-ninki">能力</span>'];
    if(isDirt && isRough && r.weight >= 510) {
      r.score += 40; r.reasons.push('<span class="badge b-power">適性</span>');
    }
    const sorted = [...allRows].sort((a,b)=>a.odds - b.odds);
    let idx = sorted.findIndex(s => s.no === r.no);
    if(idx > 0 && sorted[idx].odds / sorted[idx-1].odds > 1.6) {
      r.score += 30; r.reasons.push('<span class="badge b-dansou">断層</span>');
    }
  });

  let rankRows = [...allRows].sort((a,b)=>b.score - a.score);
  let favHorse = allRows.find(r => r.pop === 1);

  let jiku;
  let finalAite = [];

  if(antiFav && favHorse) {
    let withoutFav = rankRows.filter(r => r.no !== favHorse.no);
    jiku = withoutFav[0] || rankRows[0];
    finalAite = [favHorse, ...withoutFav.slice(1)];
  } else {
    jiku = rankRows[0];
    finalAite = rankRows.slice(1);
  }

  const aiteNum = n($('aiteNum').value);
  const selectedAiteNos = finalAite.slice(0, aiteNum).map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const top10Nos = rankRows.map(r=>r.no).slice(0,10).sort((x,y)=>n(x)-n(y));

  $('tenkaiArea').innerHTML = `軸固定: ${jiku.no} / 相手設定: ${antiFav?'1人気流し':'通常'}`;
  let resHtml = `<div><b>【軸】 ${jiku.no}.${jiku.name}</b> ${jiku.reasons.join('')}</div><hr style="border:0.2px solid #233252">`;
  finalAite.slice(0, 5).forEach(r => {
    resHtml += `<div style="margin-bottom:5px">相 ${r.no}.${r.name} ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  $('bet3tanM').innerHTML = `3連単マルチ\n軸: ${jiku.no} / 相手: ${selectedAiteNos.join(',')}`;
  $('bet3tanF').innerHTML = `3連単F(1着固定)\n1着: ${jiku.no}\n2,3着: ${selectedAiteNos.join(',')}`;

  const col2 = finalAite.slice(0, 2).map(r=>r.no);
  $('bet3pukuF').innerHTML = `3連複F\n1列目: ${jiku.no}\n2列目: ${col2.join(',')}\n3列目: ${top10Nos.join(',')}`;

  let gHtml = "";
  const maxS = rankRows[0].score;
  rankRows.slice(0, 10).forEach(r => {
    const w = maxS === 0 ? 100 : (r.score / maxS) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name} (${r.weight}kg)</span><span>${Math.round(r.score)}pt</span></div><div class="barbg"><div class="barfill" style="width:${w}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
