<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI競馬分析 V47.0 Synchronous Ultimate</title>
    <style>
        :root {
            --bg-main: #020617; --bg-card: #1e293b; --bg-input: #0f172a;
            --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6;
            --warn: #f59e0b; --danger: #ef4444; --success: #10b981; --border: #334155;
        }
        body { background: var(--bg-main); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: bold; color: var(--warn); margin-bottom: 8px; letter-spacing: 1px; }
        
        .grid-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        
        select, input, textarea { width: 100%; padding: 10px; background: var(--bg-input); color: #fff; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        textarea { height: 130px; font-family: monospace; font-size: 12px; margin-top: 5px; }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .tgl { flex: 1; padding: 10px; background: var(--border); border: none; border-radius: 6px; color: var(--muted); font-weight: bold; cursor: pointer; font-size: 12px; }
        .tgl.active { background: var(--accent); color: white; border: 1px solid #fff; }

        .exec-btn { width: 100%; padding: 18px; background: linear-gradient(180deg, #2563eb, #1e40af); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #1e3a8a; }
        .exec-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e3a8a; }

        .card { background: var(--bg-card); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; }
        .dansou-mark { color: #ff00ff; font-weight: bold; font-size: 11px; margin: 8px 0; border-top: 1px dashed #ff00ff; padding-top: 4px; }
        .ana-mark { color: #fff; background: var(--danger); padding: 2px 5px; border-radius: 3px; font-size: 10px; margin-left: 5px; font-weight: bold; }
        .jiku-label { background: var(--danger); color: white; padding: 2px 4px; border-radius: 3px; font-size: 10px; margin-right: 5px; }

        .bar-row { margin-bottom: 8px; }
        .bar-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: 0.4s; }
        .bar-fill.ana { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="section-title">Race Settings</div>
        <div class="grid-3">
            <select id="course">
                <optgroup label="地方競馬 (NAR)">
                    <option>船橋</option><option>大井</option><option>川崎</option><option>浦和</option><option>園田</option>
                    <option>高知</option><option>佐賀</option><option>門別</option><option>盛岡</option><option>水沢</option>
                    <option>金沢</option><option>笠松</option><option>名古屋</option><option>姫路</option><option>帯広</option>
                </optgroup>
                <optgroup label="中央競馬 (JRA)">
                    <option>東京</option><option>中山</option><option>中京</option><option>京都</option><option>阪神</option>
                    <option>札幌</option><option>函館</option><option>福島</option><option>新潟</option><option>小倉</option>
                </optgroup>
            </select>
            <select id="surface">
                <option>ダート</option><option>芝</option>
            </select>
            <input type="number" id="dist" placeholder="距離(m)" value="1500">
        </div>
        <div class="grid-2">
            <select id="dir"><option>左回り</option><option>右回り</option></select>
            <select id="cond">
                <option value="good">良</option><option value="soft">稍重</option>
                <option value="heavy" selected>重</option><option value="bad">不良</option>
            </select>
        </div>

        <div class="section-title">AI Mode Selection</div>
        <div class="btn-group">
            <button id="btnA" class="tgl" onclick="toggle('A')">1人気消し</button>
            <button id="btnW" class="tgl" onclick="toggle('W')">穴軸モード</button>
        </div>

        <textarea id="raw" placeholder="馬番 名前 人気 オッズ 指数 を貼り付け"></textarea>
        <!-- 即時実行でフリーズを完全回避 -->
        <button class="exec-btn" onclick="run()">🚀 断層解析・広域買い目生成</button>
    </div>

    <div id="res-area" style="display:none;">
        <div id="error-msg" style="color:var(--danger); font-weight:bold; margin-bottom:10px;"></div>
        
        <div id="result-content" style="display:none;">
            <div class="card" style="border-left-color: var(--success);">
                <div id="res-header" style="font-weight:bold; font-size:12px; color:var(--muted); margin-bottom:5px;"></div>
                <div class="section-title" style="color:#fff">【AI推奨：的中重視・広域フォーメーション】</div>
                <div id="bet-output" style="white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.4;"></div>
            </div>
            <div class="card" style="border-left-color: #ff00ff;">
                <div class="section-title" style="color:#ff00ff">【高精度能力ランキング / 断層キーマン抽出】</div>
                <div id="graph-output"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let modeA = false, modeW = false;

    function toggle(m) {
        if(m==='A') {
            modeA = !modeA;
            document.getElementById('btnA').classList.toggle('active');
            if(modeA) { modeW = false; document.getElementById('btnW').classList.remove('active'); }
        }
        if(m==='W') {
            modeW = !modeW;
            document.getElementById('btnW').classList.toggle('active');
            if(modeW) { modeA = false; document.getElementById('btnA').classList.remove('active'); }
        }
    }

    function run() {
        const rawInput = document.getElementById('raw').value.trim();
        const errBox = document.getElementById('error-msg');
        const resBox = document.getElementById('res-area');
        const contentBox = document.getElementById('result-content');
        
        errBox.innerText = "";
        resBox.style.display = 'none';
        contentBox.style.display = 'none';

        if(!rawInput) { 
            resBox.style.display = 'block';
            errBox.innerText = "❌ データをテキストボックスに貼り付けてください。";
            return; 
        }
        
        try {
            const selCourse = document.getElementById('course').value;
            const selCond = document.getElementById('cond').value;
            const condLabel = document.getElementById('cond').options[document.getElementById('cond').selectedIndex].text;
            const isRough = (selCond === 'heavy' || selCond === 'bad');
            const distValStr = document.getElementById('dist').value || "---";

            // --- 遅延なし！即時実行パースエンジン ---
            const lines = rawInput.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 2);
            let hList =[];

            for(let line of lines) {
                const clean = line.replace(/[　\t,()（）:：]/g, ' ').replace(/倍|人気|人|pt|位/g, '').trim();
                const parts = clean.split(/\s+/);
                if (parts.length < 3) continue;

                let noStr = parts[0];
                let no = parseInt(noStr);
                if(isNaN(no)) continue;

                let name = parts[1];
                let nums = parts.slice(2).map(v => parseFloat(v)).filter(v => !isNaN(v));
                if (nums.length < 2) continue;

                // 値の取得
                let pop = parseInt(nums[0]) || 10;
                let odds = parseFloat(nums[1]) || 15.0;
                let rScore = nums.length > 2 ? parseFloat(nums[2]) : 50.0;

                // 【指示3：初期ベーススコア】
                let baseScore = rScore + (20 / (pop + 1.5));

                // 【指示1：軸馬の再定義】
                if (pop === 1 && odds <= 2.9) {
                    baseScore *= 0.8; // 1番人気の過剰人気を20%割引
                }
                if (odds >= 5.0 && odds <= 15.0) {
                    baseScore *= 1.2; // 4〜7番人気ゾーンを穴軸として優先評価
                }

                // 【指示3：道悪での強制補正】
                if (isRough) {
                    if (odds >= 10.0 && odds <= 30.0) {
                        baseScore *= 1.5; // 道悪巧者とみなし1.5倍に引き上げ
                    } else if (pop <= 3) {
                        baseScore *= 0.9; // 良馬場スピード馬を1ランク下げる
                    }
                }

                let score = parseFloat(baseScore.toFixed(3));
                let ev = score * Math.pow(odds, 0.45);

                hList.push({ no, name, pop, odds, score, ev, raw: rScore, isKeyman: false, isSuperKeyman: false, isHimoAna: false });
            }

            const totalHorses = hList.length;
            if(totalHorses < 4) {
                throw new Error("解析できる馬のデータが少なすぎます。コピー範囲を広げてください。");
            }

            // スコア順にソート
            hList.sort((a,b) => b.score - a.score);

            // 【指示2：断層ロジックの強化】
            for(let i = 1; i < hList.length; i++) {
                let diff = hList[i-1].score - hList[i].score;
                if (diff >= 2.0) {
                    hList[i-1].isKeyman = true;
                    // 中位(5〜8位)の断層のすぐ上をスーパーキーマン化
                    if (i >= 4 && i <= 7) {
                        hList[i-1].isSuperKeyman = true;
                    }
                }
            }

            // --- 軸馬の選定 ---
            let pool =[...hList];
            if (modeA) pool = pool.filter(h => h.pop !== 1);
            if (pool.length === 0) pool = [...hList];
            
            let jiku;
            if (modeW) {
                jiku = [...pool].sort((a,b) => b.ev - a.ev)[0];
            } else {
                jiku = pool[0];
            }

            // --- 【指示4：ヒモ抜け防止】相手選定 ---
            const others = hList.filter(h => h.no !== jiku.no);
            
            // 2着候補（本線）: 指数上位 + キーマン強制追加
            let coreAite = [...others].sort((a,b) => b.score - a.score).slice(0, 3);
            others.forEach(h => {
                if ((h.isKeyman || h.isSuperKeyman) && !coreAite.some(c => c.no === h.no)) {
                    coreAite.push(h);
                }
            });

            // 3着候補（ヒモ穴強制追加）
            // スコア下半分から、外枠(馬番が総頭数の半分より外)を2頭抽出
            let lowerHalf = [...others].sort((a,b) => a.score - b.score).slice(0, Math.ceil(others.length / 2));
            let outFrame = lowerHalf.filter(h => parseInt(h.no) > totalHorses / 2);
            
            let himoAna = outFrame.slice(0, 2);
            // 足りなければ下位の期待値上位で補う
            if (himoAna.length < 2) {
                let remain = lowerHalf.filter(h => !himoAna.some(a => a.no === h.no)).sort((a,b) => b.ev - a.ev);
                while(himoAna.length < 2 && remain.length > 0) {
                    himoAna.push(remain.shift());
                }
            }
            himoAna.forEach(h => h.isHimoAna = true);

            // 3着候補の統合
            let aite3rd = [...coreAite];
            himoAna.forEach(h => {
                if (!aite3rd.some(a => a.no === h.no)) aite3rd.push(h);
            });
            
            // 5頭に満たない場合は期待値上位で枠を埋める
            let valueAite = others.filter(h => !aite3rd.some(a => a.no === h.no)).sort((a,b) => b.ev - a.ev);
            while(aite3rd.length < 5 && valueAite.length > 0) {
                aite3rd.push(valueAite.shift());
            }

            const aite5 = aite3rd.slice(0, 5);
            const aite4 = aite5.slice(0, 4);

            // --- 出力生成 ---
            document.getElementById('res-header').innerText = `${selCourse} ${distValStr}m (${condLabel}) / ${totalHorses}頭立て`;
            
            let betHtml = `【推奨軸 (1着固定)】 ${jiku.no} (${jiku.name}) ${jiku.pop}人/${jiku.odds}倍\n\n`;
            
            let sk = hList.filter(h => h.isSuperKeyman).map(h => h.no).join(', ');
            if (sk) {
                betHtml += `🌟 高配当キーマン(2・3着厚め): ${sk}\n\n`;
            }

            betHtml += `【的中重視・広域3連単フォーメーション】\n`;
            betHtml += ` 1着: ${jiku.no}\n`;
            betHtml += ` 2着: ${coreAite.map(h=>h.no).join(', ')}\n`;
            betHtml += ` 3着: ${aite3rd.map(h=>h.no).join(', ')}\n\n`;

            betHtml += `【3連複フォーメーション】\n`;
            betHtml += ` 1頭目: ${jiku.no}\n`;
            betHtml += ` 2頭目: ${coreAite.map(h=>h.no).join(', ')}\n`;
            betHtml += ` 3頭目: ${aite3rd.map(h=>h.no).join(', ')}\n\n`;

            betHtml += `【推奨3連単マルチ(参考)】\n`;
            betHtml += ` 🔥 36点: ${jiku.no} ↔ ${aite4.map(h=>h.no).join(', ')}\n`;
            betHtml += ` 🎯 60点: ${jiku.no} ↔ ${aite5.map(h=>h.no).join(', ')}\n`;
            
            document.getElementById('bet-output').innerHTML = betHtml;

            // --- ランキング表示 ---
            const maxS = Math.max(...hList.map(h => h.score));
            let graphHtml = "";
            hList.forEach((h, i) => {
                const diff = i > 0 ? (hList[i-1].score - h.score).toFixed(2) : 0;
                if (i > 0 && diff >= 2.0) {
                    graphHtml += `<div class="dansou-mark">⚠️ 指数断層 (${diff}pt差)</div>`;
                }
                
                let tag = "";
                if (h.isSuperKeyman) tag = '<span class="ana-mark" style="background:#f59e0b">超特注</span>';
                else if (h.isKeyman) tag = '<span class="ana-mark" style="background:#3b82f6">断層上</span>';
                else if (h.isHimoAna) tag = '<span class="ana-mark" style="background:#8b5cf6">ヒモ穴枠</span>';

                const isJ = h.no === jiku.no ? '<span class="jiku-label">推奨軸</span>' : '';
                graphHtml += `<div class="bar-row"><div class="bar-info"><span>${isJ}${i+1}. ${h.no} ${h.name} <small>${h.odds}倍</small>${tag}</span><span>${h.score.toFixed(1)}pt</span></div><div class="bar-bg"><div class="bar-fill ${tag!==''?'ana':''}" style="width:${(h.score/maxS*100)}%"></div></div></div>`;
            });
            
            document.getElementById('graph-output').innerHTML = graphHtml;
            resBox.style.display = 'block';
            contentBox.style.display = 'block';

        } catch (e) {
            resBox.style.display = 'block';
            errBox.innerHTML = `❌ エラーが発生しました。<br>【原因】${e.message}<br>※データのコピー範囲を確認してください。`;
        }
    }
</script>
</body>
</html>
