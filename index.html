<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI競馬分析 V33.0 Predator Hybrid X</title>
    <style>
        :root {
            --bg-main: #020617; --bg-card: #1e293b; --bg-input: #0f172a;
            --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6;
            --warn: #f59e0b; --danger: #ef4444; --success: #10b981; --border: #334155;
        }
        body { background: var(--bg-main); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: bold; color: var(--warn); margin-bottom: 8px; letter-spacing: 1px; }
        
        .grid-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        
        select, input, textarea { width: 100%; padding: 10px; background: var(--bg-input); color: #fff; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        textarea { height: 120px; font-family: monospace; font-size: 12px; margin-top: 5px; }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .tgl { flex: 1; padding: 12px; background: var(--border); border: none; border-radius: 6px; color: var(--muted); font-weight: bold; cursor: pointer; font-size: 12px; }
        .tgl.active { background: var(--accent); color: white; border: 1px solid #fff; }

        .exec-btn { width: 100%; padding: 18px; background: linear-gradient(180deg, #2563eb, #1e40af); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #1e3a8a; }
        .exec-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e3a8a; }

        .card { background: var(--bg-card); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; }
        .dansou-mark { color: #ff00ff; font-weight: bold; font-size: 11px; margin: 8px 0; border-top: 1px dashed #ff00ff; padding-top: 4px; }
        .ana-mark { color: #fff; background: var(--danger); padding: 2px 5px; border-radius: 3px; font-size: 10px; margin-left: 5px; font-weight: bold; }
        .jiku-label { background: var(--danger); color: white; padding: 2px 4px; border-radius: 3px; font-size: 10px; margin-right: 5px; }

        .bar-row { margin-bottom: 8px; }
        .bar-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: 0.4s; }
        .bar-fill.ana { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="section-title">Race Info</div>
        <div class="grid-3">
            <select id="course">
                <option>園田</option><option>船橋</option><option>大井</option><option>川崎</option><option>浦和</option>
                <option>高知</option><option>佐賀</option><option>東京</option><option>中山</option><option>中京</option>
            </select>
            <select id="surface">
                <option>ダート</option><option>芝</option>
            </select>
            <input type="number" id="dist" placeholder="距離(m)" value="1400">
        </div>
        <div class="grid-2">
            <select id="dir">
                <option>右回り</option><option>左回り</option>
            </select>
            <select id="cond">
                <option value="good">良</option><option value="soft">稍重</option>
                <option value="heavy">重</option><option value="bad">不良</option>
            </select>
        </div>

        <div class="section-title">AI Logic Mode</div>
        <div class="btn-group">
            <button id="btnA" class="tgl" onclick="toggle('A')">1人気消し</button>
            <button id="btnW" class="tgl" onclick="toggle('W')">穴軸モード</button>
        </div>

        <textarea id="raw" placeholder="馬番 名前 人気 オッズ 指数 を貼り付け"></textarea>
        <button id="execBtn" class="exec-btn" onclick="run()">🚀 本命・穴 究極ハイブリッド分析</button>
    </div>

    <div id="res-area" style="display:none;">
        <div class="card" style="border-left-color: var(--success);">
            <div id="res-header" style="font-weight:bold; font-size:12px; color:var(--muted); margin-bottom:5px;"></div>
            <div class="section-title" style="color:#fff">【AI推奨：的中＆回収 黄金買い目】</div>
            <div id="bet-output" style="white-space: pre-wrap; font-family: monospace; font-size: 13px;"></div>
        </div>
        <div class="card" style="border-left-color: #ff00ff;">
            <div class="section-title" style="color:#ff00ff">【AI高精度ランキング / 波乱度分析】</div>
            <div id="graph-output"></div>
        </div>
    </div>
</div>

<script>
    let modeA = false, modeW = false;
    function toggle(m) {
        if(m==='A') { modeA = !modeA; document.getElementById('btnA').classList.toggle('active'); }
        if(m==='W') { modeW = !modeW; document.getElementById('btnW').classList.toggle('active'); }
    }

    function run() {
        const rawInput = document.getElementById('raw').value.trim();
        const btn = document.getElementById('execBtn');
        if(!rawInput) { alert("データを入力してください"); return; }
        
        btn.innerText = "⏳ 本命・穴を同時演算中...";

        setTimeout(() => {
            try {
                // --- V33.0 超堅牢パース & 赤オッズ保護エンジン ---
                const lines = rawInput.split('\n').filter(l => l.trim().length > 2);
                let hList = [];

                lines.forEach((line) => {
                    const clean = line.replace(/[　\t,()（）:：\-+]/g, ' ').replace(/倍|人気|人|pt/g, '').trim();
                    const nums = clean.match(/\d+(\.\d+)?/g);
                    if(!nums || nums.length < 2) return;

                    const parts = clean.split(/\s+/);
                    const no = nums[0];
                    const name = parts[1] || "馬" + no;
                    const numVals = nums.map(v => parseFloat(v));
                    
                    const pop = numVals.find(n => n >= 1 && n <= 22) || 10;
                    const odds = numVals.find(n => n > 1.0 && n < 1000 && n !== pop) || 10.0;
                    const rScore = numVals.find(n => n >= 30 && n <= 95) || 55.0;

                    // 【核心：赤オッズ保護ロジック】
                    // オッズが4.0未満の有力馬(赤オッズ)に強力な格付け加点を行い、通常モードでの軸落ちを防ぐ
                    let favoriteBonus = (odds < 4.0) ? (15 / odds) : 0;
                    let stabilityAdj = (22 - pop) * 0.15;
                    
                    const score = parseFloat((rScore * 1.1 + stabilityAdj + favoriteBonus).toFixed(6));
                    const ev = score * Math.sqrt(odds);

                    hList.push({ no, name, pop, odds, score, ev, raw: rScore });
                });

                if(hList.length < 4) throw new Error("解析データ不足");

                // スコア順（実力順）でソート
                hList.sort((a,b) => b.score - a.score);

                // --- 軸馬の選定（モード連動） ---
                let jiku;
                let pool = [...hList];
                if (modeA) pool = pool.filter(h => h.pop !== 1);

                if (modeW) {
                    // 穴軸モード：期待値(EV)が最大の馬を推奨（リスクあり）
                    jiku = pool.slice(0, 10).sort((a,b) => b.ev - a.ev)[0];
                } else {
                    // 通常モード：AI指数が最高の馬（赤オッズ馬がいれば確実にここ）
                    jiku = pool[0];
                }

                // 【最強ハイブリッド選定：赤オッズ本命馬2頭 ＋ 爆撃穴馬2頭を確実に拾う】
                const others = hList.filter(h => h.no !== jiku.no);
                
                // 1. 本命実力枠（実力最上位2頭：これがないと「あたらん」と言われる）
                const teppan = [...others].sort((a,b) => b.score - a.score).slice(0, 2);
                
                // 2. 爆撃穴馬枠（残りから期待値最大2頭：これで中穴を拾う）
                const bakugeki = others.filter(h => !teppan.some(c => c.no === h.no))
                                       .sort((a,b) => b.ev - a.ev).slice(0, 2);

                const aite5 = [...teppan, ...bakugeki].filter(h => h);
                // 5頭目が足りない場合の補完
                if(aite5.length < 5) {
                    const extra = others.filter(h => !aite5.some(a => a.no === h.no))[0];
                    if(extra) aite5.push(extra);
                }
                const aite4 = aite5.slice(0, 4);

                // --- 出力 ---
                const course = document.getElementById('course').value;
                const dist = document.getElementById('dist').value || "---";
                const condLabel = document.getElementById('cond').options[document.getElementById('cond').selectedIndex].text;
                document.getElementById('res-header').innerText = `${course} ${dist}m (${condLabel})`;
                
                let betHtml = `【AI推奨軸】 ${jiku.no} (${jiku.name}) ${jiku.pop}人/${jiku.odds}倍\n\n`;
                
                betHtml += `【3連複フォーメーション】\n`;
                betHtml += ` 1頭目: ${jiku.no}\n`;
                betHtml += ` 2頭目: ${teppan.map(h=>h.no).join(', ')}\n`;
                betHtml += ` 3頭目: ${aite5.map(h=>h.no).join(', ')}\n\n`;

                betHtml += `【3連単フォーメーション】\n`;
                betHtml += ` 1着: ${jiku.no}\n`;
                betHtml += ` 2着: ${teppan.map(h=>h.no).join(', ')}\n`;
                betHtml += ` 3着: ${aite5.map(h=>h.no).join(', ')}\n\n`;

                betHtml += `【AI推奨3連単マルチ】\n`;
                betHtml += ` 🔥 36点(相手4頭): ${jiku.no} ↔ ${aite4.map(h=>h.no).join(', ')}\n`;
                betHtml += ` 🎯 60点(相手5頭): ${jiku.no} ↔ ${aite5.map(h=>h.no).join(', ')}\n\n`;
                
                betHtml += `【馬連・ワイド流し】\n 軸: ${jiku.no} ↔ 相手: ${aite5.map(h=>h.no).join(', ')}`;
                
                document.getElementById('bet-output').innerHTML = betHtml;

                // ランキング
                const maxS = Math.max(...hList.map(h => h.score));
                let graphHtml = "";
                hList.forEach((h, i) => {
                    const diff = i > 0 ? (hList[i-1].score - h.score).toFixed(2) : 0;
                    if (i > 0 && diff >= 0.7) graphHtml += `<div class="dansou-mark">⚠️ 指数断層 (${diff}pt差)</div>`;
                    
                    let tag = "";
                    if (h.odds < 4.0) tag = '<span class="ana-mark" style="background:#ef4444">本命級</span>';
                    else if (aite5.some(a => a.no === h.no && a.pop >= 4)) tag = '<span class="ana-mark">特注馬</span>';

                    const isJ = h.no === jiku.no ? '<span class="jiku-label">推奨軸</span>' : '';
                    graphHtml += `<div class="bar-row"><div class="bar-info"><span>${isJ}${i+1}. ${h.no} ${h.name} <small>${h.odds}倍</small>${tag}</span><span>${h.score.toFixed(1)}pt</span></div><div class="bar-bg"><div class="bar-fill ${h.odds < 4 ? '' : 'ana'}" style="width:${(h.score/maxS*100)}%"></div></div></div>`;
                });
                document.getElementById('graph-output').innerHTML = graphHtml;
                document.getElementById('res-area').style.display = 'block';
                btn.innerText = "🚀 究極ハイブリッド分析・生成";

            } catch (e) {
                btn.innerText = "🚀 究極ハイブリッド分析・生成";
                alert("データの解析に失敗しました。コピー内容を確認してください。");
            }
        }, 100);
    }
</script>
</body>
</html>
