<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI競馬分析 V49.0 Precision Core</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; }
        textarea { width: 100%; height: 150px; background: #1e293b; color: #fff; border: 1px solid #334155; }
        .exec-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #output { margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <textarea id="raw" placeholder="馬番 名前 人気 オッズ 指数"></textarea>
    <button class="exec-btn" onclick="run()">分析開始</button>
    <div id="output"></div>

<script>
function run() {
    const raw = document.getElementById('raw').value.trim();
    if(!raw) return;
    
    const lines = raw.split('\n');
    let hList = lines.map(line => {
        const parts = line.split(/\s+/);
        // 数字のみ抽出
        const nums = line.match(/\d+(\.\d+)?/g).map(Number);
        if(nums.length < 3) return null;
        
        return { 
            no: nums[0], 
            pop: nums[1], 
            odds: nums[2], 
            score: nums[3] || 50 
        };
    }).filter(h => h);

    // 【通常モード】指数とオッズのバランスで軸決定
    hList.sort((a,b) => b.score - a.score);
    let jiku = hList[0];
    
    // 1番人気が強い場合、オッズが3倍以下なら軸を1番人気に修正するガード
    let fav = hList.sort((a,b) => a.pop - b.pop)[0];
    if(fav.odds < 3.0) jiku = fav;

    // 相手選定：指数上位4頭
    let aite = hList.filter(h => h.no != jiku.no).slice(0, 4);

    let out = `【推奨軸】 ${jiku.no}番 (${jiku.pop}人 / ${jiku.odds}倍)\n`;
    out += `【3連単マルチ(36点)】\n${jiku.no} ↔ ${aite.map(h=>h.no).join(', ')}\n\n`;
    out += `【ランキング】\n` + hList.map((h,i) => `${i+1}位: ${h.no}番 (${h.score}pt)`).join('\n');
    
    document.getElementById('output').innerText = out;
}
</script>
</body>
</html>
