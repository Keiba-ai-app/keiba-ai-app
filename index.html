<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬AI分析 V7.1 Professional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --warn: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            font-size: 14px;
        }

        .container { max-width: 500px; margin: auto; }

        header { text-align: center; margin-bottom: 15px; }
        header h1 { font-size: 18px; color: var(--accent); margin: 0; }

        .panel {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--warn);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-config {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .sub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        select, input, textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input::placeholder { color: #475569; }

        .opt-flex { display: flex; gap: 8px; margin-bottom: 12px; }
        .tgl {
            flex: 1; padding: 10px; background: var(--border); border: none;
            border-radius: 6px; color: var(--text-muted); font-weight: bold; cursor: pointer;
        }
        .tgl.active { background: var(--accent); color: white; }

        .exec-btn {
            width: 100%; padding: 16px; background: linear-gradient(180deg, var(--accent), var(--accent-hover));
            color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 17px;
            cursor: pointer; box-shadow: 0 4px 0 #1d4ed8; margin-top: 5px;
        }
        .exec-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1d4ed8; }

        #res-area { display: none; margin-top: 20px; }
        .card {
            background: var(--bg-card); padding: 12px; border-radius: 8px;
            border-left: 4px solid var(--accent); margin-bottom: 10px;
        }
        .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .val { font-family: monospace; font-size: 15px; font-weight: bold; }

        .bar-wrap { margin-top: 10px; }
        .bar-row { margin-bottom: 8px; }
        .bar-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; gap: 8px; }
        .bar-info span:first-child { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: 0.5s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI 競馬分析 V7.1 Pro</h1>
    </header>

    <div class="panel">
        <div class="section-title">Race Settings</div>
        <div class="grid-config">
            <select id="course">
                <optgroup label="中央競馬 (JRA)">
                    <option value="札幌">札幌</option><option value="函館">函館</option>
                    <option value="福島">福島</option><option value="新潟">新潟</option>
                    <option value="中山">中山</option><option value="東京">東京</option>
                    <option value="中京">中京</option><option value="京都">京都</option>
                    <option value="阪神">阪神</option><option value="小倉">小倉</option>
                </optgroup>
                <optgroup label="地方競馬 (NAR)">
                    <option value="門別">門別</option><option value="盛岡">盛岡</option>
                    <option value="水沢">水沢</option><option value="浦和">浦和</option>
                    <option value="船橋">船橋</option><option value="大井">大井</option>
                    <option value="川崎">川崎</option><option value="金沢">金沢</option>
                    <option value="笠松">笠松</option><option value="名古屋">名古屋</option>
                    <option value="園田">園田</option><option value="姫路">姫路</option>
                    <option value="高知">高知</option><option value="佐賀">佐賀</option>
                    <option value="帯広">帯広(ばんえい)</option>
                </optgroup>
            </select>
            <input type="number" id="dist" placeholder="距離 (m)">
        </div>
        <div class="sub-grid">
            <select id="dir">
                <option value="右">右回り</option>
                <option value="左">左回り</option>
                <option value="直">直線</option>
            </select>
            <select id="cond">
                <option value="1">良</option><option value="1.05">稍重</option>
                <option value="1.1">重</option><option value="1.15">不良</option>
            </select>
        </div>

        <div class="section-title" style="margin-top:15px;">Options</div>
        <div class="opt-flex">
            <button class="tgl" onclick="this.classList.toggle('active'); optA=!optA">1人気消し</button>
            <button class="tgl" onclick="this.classList.toggle('active'); optW=!optW">穴軸モード</button>
        </div>

        <div class="section-title">Paste Data</div>
        <textarea id="raw" placeholder="馬番 名前 人気 オッズ 指数"></textarea>
        
        <button class="exec-btn" onclick="run()">🚀 分析・買い目生成</button>
    </div>

    <div id="res-area">
        <div class="card" style="border-left-color: var(--success);">
            <div id="res-title" style="font-weight:bold; font-size:13px; margin-bottom:5px;"></div>
            <div class="label">【推奨買い目】</div>
            <div id="bet" class="val"></div>
        </div>
        <div class="card">
            <div class="label">📊 指数ランキング</div>
            <div id="graph" class="bar-wrap"></div>
        </div>
    </div>
</div>

<script>
    let optA = false, optW = false;

    function run() {
        const raw = document.getElementById('raw').value.trim();
        if (!raw) return alert('データを入力してください');

        const course = document.getElementById('course').value;
        const dist = document.getElementById('dist').value || '---';
        const dir = document.getElementById('dir').value;
        const lines = raw.split('\n').filter(Boolean);

        let data = lines.map(l => {
            const d = l.trim().split(/\s+/);
            return {
                no: d[0] || '',
                name: d[1] || '',
                pop: parseInt(d[2], 10),
                odds: parseFloat(d[3]),
                score: parseFloat(d[4]) || 0
            };
        }).filter(h => h.no && h.name && !Number.isNaN(h.pop) && !Number.isNaN(h.odds))
          .sort((a,b) => b.score - a.score);

        if (data.length < 2) return alert('有効なデータが足りません');

        let jiku = optA ? data.find(h => h.pop !== 1) : data[0];
        if (!jiku) jiku = data[0];
        
        if (optW) {
            const anaCand = data.slice(0, 5).sort((a,b) => (b.score / Math.max(b.odds, 0.1)) - (a.score / Math.max(a.odds, 0.1)));
            jiku = anaCand[0] || jiku;
        }

        const aite = data.filter(h => h.no !== jiku.no).slice(0, 4).map(h => h.no);

        document.getElementById('res-area').style.display = 'block';
        document.getElementById('res-title').innerText = `${course} ${dist}m (${dir}) 判定結果`;
        document.getElementById('bet').innerHTML =
            `<span style="color:var(--warn)">軸: ${jiku.no}</span><br>` +
            `<span style="font-size:13px;">相手: ${aite.join(', ')}</span><br>` +
            `<small style="color:var(--text-muted); font-weight:normal;">(馬連・ワイド流し / 3連複1頭軸)</small>`;

        const max = Math.max(...data.map(d => d.score), 1);
        document.getElementById('graph').innerHTML = data.slice(0, 5).map(h => `
            <div class="bar-row">
                <div class="bar-info"><span>${h.no} ${h.name}</span><span>${h.score}pt</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${(h.score / max * 100)}%"></div></div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
