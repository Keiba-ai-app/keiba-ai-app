<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>競馬AI V6Fix</title>
  <link rel="manifest" href="manifest.json">
</head>
<body style="margin:0; padding:20px; background:#000814;">
<div style="background-color: #001f3f; color: #fff; font-family: sans-serif; padding: 15px; border-radius: 10px; max-width: 500px; margin: auto; border: 2px solid #0074D9;">

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
    <div>
      <label style="font-size: 11px; color: #85fffd;">距離(m)</label>
      <input id="inDist" type="text" placeholder="1200" style="width: 100%; padding: 10px; background: #fff; color: #000; border: none; border-radius: 5px; box-sizing: border-box; font-weight: bold;">
    </div>
    <div>
      <label style="font-size: 11px; color: #85fffd;">馬場</label>
      <select id="selCond" style="width: 100%; padding: 10px; background: #003366; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
      </select>
    </div>
    <div>
      <label style="font-size: 11px; color: #85fffd;">競馬場</label>
      <select id="selCourse" style="width: 100%; padding: 10px; background: #003366; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option><option value="京都">京都</option><option value="大井">大井</option>
      </select>
    </div>
    <div>
      <label style="font-size: 11px; color: #85fffd;">回り</label>
      <select id="selDir" style="width: 100%; padding: 10px; background: #003366; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="右回り">右回り</option><option value="左回り">左回り</option>
      </select>
    </div>
  </div>

  <div style="background: #003366; padding: 10px; border-radius: 5px; margin-bottom: 12px; border: 1px solid #0074D9; display: flex; justify-content: space-around;">
    <span><input type="checkbox" id="chkAnti"> 1人気消し</span>
    <span><input type="checkbox" id="chkW"> W軸</span>
  </div>

  <textarea id="rawGrid" style="width: 100%; height: 100px; background: #001f3f; color: #fff; border: 1px solid #0074D9; border-radius: 5px; padding: 10px; margin-bottom: 12px; box-sizing: border-box;" placeholder="ここにデータを貼り付け"></textarea>

  <button type="button" onclick="fnV6Fix()" style="width: 100%; padding: 15px; background: linear-gradient(180deg, #FFD700 0%, #FF8C00 100%); color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor:pointer; box-shadow: 0 4px 0 #CC7A00; margin-bottom: 15px;">
    🚀 分析実行
  </button>

  <div id="v6BetArea">
    <div style="background:#003366; border:1px solid #0074D9; padding:15px; border-radius:8px; color:#aaa; font-size:14px;">分析を実行すると、ここに買い目が表示されます。</div>
  </div>

</div>

<script>
window.fnV6Fix = function() {
  var area = document.getElementById('rawGrid');
  if(!area || !area.value) return;
  var lines = area.value.split('\n').filter(l => l.trim() !== '');
  var chkAnti = document.getElementById('chkAnti').checked;
  var chkW = document.getElementById('chkW').checked;

  var list = lines.map(line => {
    var d = line.split('\t');
    var s = parseFloat(d[4]) || 0;
    var txt = (d[1]||'') + (d[5]||'');
    if(document.getElementById('inDist').value && txt.includes(document.getElementById('inDist').value)) s += 5;
    if(document.getElementById('selCond').value && txt.includes(document.getElementById('selCond').value)) s += 5;
    if(document.getElementById('selDir').value && txt.includes(document.getElementById('selDir').value)) s += 5;
    return { no: d[0], name: d[1], pop: parseInt(d[2])||99, score: s };
  });
  list.sort((a,b) => b.score - a.score);

  if (!list.length) return;

  var jiku = chkAnti ? list.filter(r => r.pop !== 1)[0] : list[0];
  if (!jiku) jiku = list[0];
  var others = list.filter(r => r.no !== jiku.no);
  var aite = others.slice(0, 5);
  var aiteNames = aite.map(h => h.no + ' ' + h.name).join('、');
  var aiteNos = aite.map(h => h.no).join(',');
  var jikuLabel = jiku.no + ' ' + jiku.name;
  var first = chkW && others[0] ? jiku.no + ',' + others[0].no : jiku.no;

  document.getElementById('v6BetArea').innerHTML = `
    <div style="background:#003366; border:1px solid #0074D9; padding:15px; border-radius:8px; margin-bottom:10px;">
      <div style="color:#85fffd; font-weight:bold; margin-bottom:5px;">【3連単マルチ 60点】</div>
      <div style="font-size:16px;">軸 ${jikuLabel}</div>
      <div style="font-size:16px; margin-top:5px;">↔ 相手 ${aiteNames}</div>
    </div>
    <div style="background:#003366; border:1px solid #0074D9; padding:15px; border-radius:8px;">
      <div style="color:#85fffd; font-weight:bold; margin-bottom:5px;">【3連単F】</div>
      <div style="font-size:16px;">1着：${first}</div>
      <div style="font-size:16px;">2着：${aiteNos}</div>
      <div style="font-size:16px;">3着：全網羅</div>
    </div>
  `;
};
</script>
</body>
</html>
