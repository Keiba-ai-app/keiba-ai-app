<!-- 抜粋：相手選定ロジックを改良 -->
<script>
// 修正箇所：相手選定ロジック
const otherPool = baseList.filter(h => h.no !== jiku.no);

// 1. 指数上位2頭（堅実）
const strongHorses = [...otherPool].sort((a,b) => b.score - a.score).slice(0, 2);

// 2. 指数は低くても一発ある馬（4番のような馬を拾う）
// 期待値(ev)が高く、かつオッズが15倍以上の馬を優先的に混ぜる
const surpriseHorses = otherPool.filter(h => !strongHorses.includes(h))
    .sort((a,b) => b.ev - a.ev).slice(0, 3);

// 合計5頭で相手構成
const aite5 = [...strongHorses, ...surpriseHorses];
const aite4 = aite5.slice(0, 4); // 36点用
</script>
