<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI V3.5 - 根拠可視化・ロジック透明化版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:12px}
.banner{background:linear-gradient(135deg, #1e40af, #4338ca);border-radius:14px;padding:12px;font-weight:900;margin-bottom:12px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:12px}
.title{font-size:20px;font-weight:900;margin-bottom:10px;color:#f59e0b}
.row{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:10px}
.box{background:#071225;border:1px solid #233252;border-radius:12px;padding:10px}
.v_bet{font-size:18px;color:#f59e0b;font-family:monospace;letter-spacing:1px;white-space:pre-wrap;background:#000;padding:10px;border-radius:8px}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:10px;font-size:16px}
button{width:100%;border:none;border-radius:12px;padding:18px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;cursor:pointer;margin-top:8px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px}
.b-idx{background:#1e40af;color:#fff} .b-gap{background:#7c2d12;color:#fff} .b-wak{background:#065f46;color:#fff} .b-bad{background:#b91c1c;color:#fff}
.strategy-note{background:#1e293b;padding:10px;border-radius:12px;margin-bottom:10px;font-size:13px;border-left:4px solid #3b82f6;color:#60a5fa}
.barwrap{margin:10px 0}
.barlabel{font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:10px;background:#1f2937;border-radius:5px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #3b82f6, #60a5fa)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V3.5 - 根拠可視化エンジン</div>

  <div class="card">
    <div class="row">
      <div><label>場</label><select id="track"><option>中山</option><option>阪神</option><option>中京</option><option>東京</option><option selected>大井</option></select></div>
      <div><label>馬場</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
      <div><label>設定</label><select id="betMode"><option value="60">60点(5頭)</option><option value="36">36点(4頭)</option></select></div>
    </div>
    <div style="margin-bottom:10px"><input type="checkbox" id="antiFav"> <label style="display:inline;color:#ef4444">1人気を軸から外す</label></div>
    <textarea id="pasteArea" rows="5" placeholder="馬番 名前 人気 オッズ 斤量 増減"></textarea>
    <button onclick="calc()">分析・根拠を表示</button>
  </div>

  <div id="strategy" class="strategy-note">条件を入力してください。</div>

  <div class="card">
    <div class="title">🎯 厳選5頭とその根拠</div>
    <div id="reasonArea"></div>
  </div>

  <div class="card">
    <div class="title">💰 推奨買い目</div>
    <div class="box"><label id="labelM">3連単マルチ</label><div id="bet3tanM" class="v_bet">-</div></div>
  </div>

  <div class="card">
    <div class="title">📊 指数・除外理由グラフ</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function calc(){
  const lines = $('pasteArea').value.split('\n').filter(Boolean);
  let rows = [];
  lines.forEach(line => {
    const p = line.split(/\s+/);
    if(p.length >= 4) {
      rows.push({
        no: p[0], name: p[1], pop: n(p[2]), odds: n(p[3]), weightChange: n(p[p.length-1]),
        score: 0, reasons: [], skipReason: "", isGap: false
      });
    }
  });

  const track = $('track').value;
  const dist = n($('distance').value);
  const isRough = ($('cond').value === '重' || $('cond').value === '不良');

  rows.forEach(r => {
    r.score = (25 - r.pop) + (r.odds < 10 ? 15 : 5);
    r.reasons.push('<span class="badge b-idx">指数</span>');
    if(dist <= 1300 && n(r.no) <= 4) { r.score += 7; r.reasons.push('<span class="badge b-wak">枠利</span>'); }
    if(isRough && r.pop >= 6) { r.score += 8; r.reasons.push('<span class="badge b-bad">馬場</span>'); }
    const sorted = [...rows].sort((a,b)=>a.odds - b.odds);
    let idx = sorted.findIndex(s => s.no === r.no);
    if(idx > 0 && sorted[idx].odds / sorted[idx-1].odds > 1.6) {
      r.score += 10; r.isGap = true; r.reasons.push('<span class="badge b-gap">断層</span>');
    }
  });

  rows.forEach(r => {
    if($('antiFav').checked && r.pop === 1) { r.score -= 40; r.skipReason = "1人気除外設定"; }
    if(Math.abs(r.weightChange) >= 12) { r.score -= 15; r.skipReason = `体重増減(${r.weightChange}kg)`; }
  });

  rows.sort((a,b)=>b.score - a.score);
  const selected = rows.slice(0, 5);
  const r1 = selected[0];
  const aite = selected.slice(1, ($('betMode').value === "60" ? 5 : 4));

  let resHtml = "";
  selected.forEach((r, i) => {
    resHtml += `<div style="margin-bottom:8px"><b>${i==0?'軸':'相手'}: ${r.no}.${r.name}</b> ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  $('bet3tanM').textContent = `軸:${r1.no}\n相手:${aite.map(a=>a.no).join(',')}`;

  let gHtml = "";
  rows.slice(0, 10).forEach(r => {
    const w = (r.score / rows[0].score) * 100;
    const skip = r.skipReason ? `<span style="color:#ef4444;font-size:10px"> [除外: ${r.skipReason}]</span>` : "";
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name}</span>${skip}</div><div class="barbg"><div class="barfill" style="width:${Math.max(w,0)}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
  $('strategy').textContent = `${track} ${dist}m / ${$('cond').value}馬場 分析完了`;
}
</script>
</body>
</html>
