<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI V4.3 - 全条件適性評価版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:12px}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:14px;padding:12px;font-weight:900;margin-bottom:12px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:12px}
.title{font-size:17px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:10px}
.v_bet{font-size:16px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:10px;border-radius:8px;margin-top:5px;line-height:1.4}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:10px;font-size:16px}
button{width:100%;border:none;border-radius:12px;padding:18px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;cursor:pointer;margin-top:8px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px}
.b-idx{background:#1e40af} .b-gap{background:#7c2d12} .b-wak{background:#065f46} .b-bad{background:#b91c1c}
.style-tag{font-size:10px;padding:2px 4px;border-radius:4px;margin-right:4px;background:#334155}
.s-nige{background:#b91c1c} .s-sashi{background:#1e40af}
.barwrap{margin:10px 0}
.barlabel{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:8px;background:#1f2937;border-radius:4px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #3b82f6, #f59e0b)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V4.3 - 全条件適性・完全評価版</div>

  <div class="card">
    <div class="row">
      <div><label>競馬場</label><select id="track">
        <optgroup label="地方"><option selected>大井</option><option>船橋</option><option>川崎</option><option>浦和</option></optgroup>
        <optgroup label="JRA"><option>中京</option><option>中山</option><option>東京</option><option>阪神</option></optgroup>
      </select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>種別</label><select id="surf"><option value="ダ">ダート</option><option value="芝">芝</option></select></div>
      <div><label>回り</label><select id="rot"><option value="右">右回り</option><option value="左">左回り</option></select></div>
    </div>
    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
      <div><label>相手設定</label><select id="aiteNum"><option value="5" selected>推奨5頭</option><option value="4">絞り4頭</option></select></div>
    </div>
    <div style="margin-bottom:10px"><input type="checkbox" id="antiFav"> <label style="display:inline;color:#ef4444;font-size:14px;font-weight:bold">1人気を軸から外す</label></div>
    <textarea id="pasteArea" rows="6" placeholder="データをここに貼り付けてください"></textarea>
    <button onclick="calc()">全適性を分析して買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 展開・適性分析の結果</div>
    <div id="tenkaiArea" style="font-size:13px;color:#cbd5e1;margin-bottom:10px"></div>
    <div id="reasonArea" style="font-size:14px"></div>
  </div>

  <div class="card">
    <div class="title">💰 推奨買い目</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📊 条件適性スコア (上位10頭)</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function calc(){
  const inputData = $('pasteArea').value.trim();
  if(!inputData) return alert('データを入力してください');
  const lines = inputData.split('\\n').filter(Boolean);
  let rows = [];

  lines.forEach(line => {
    const p = line.trim().split(/\\s+/);
    if(p.length < 3) return;
    let style = "先行";
    if(/逃/.test(line)) style = "逃げ";
    else if(/差/.test(line)) style = "差し";
    else if(/追/.test(line)) style = "追込";
    const nums = p.map(x => n(x)).filter(x => !isNaN(x));
    rows.push({
      no: p[0], name: p[1], pop: nums[1] || 99, odds: nums[2] || 99,
      style: style, weight: nums[nums.length-2] || 500,
      score: 0, reasons: []
    });
  });

  const nigeCount = rows.filter(r => r.style === "逃げ").length;
  const isHighPace = nigeCount >= 3;
  const dist = n($('distance').value);
  const cond = $('cond').value;

  rows.forEach(r => {
    r.score = (20 - r.pop) + (r.odds < 15 ? 10 : 2);
    r.reasons.push('<span class="badge b-idx">能力</span>');

    if(isHighPace && (r.style === "差し" || r.style === "追込")) { r.score += 15; r.reasons.push('<span class="badge b-bad">展開◎</span>'); }
    else if(!isHighPace && r.style === "逃げ") { r.score += 12; r.reasons.push('<span class="badge b-wak">単騎逃</span>'); }

    if($('surf').value === 'ダ' && (cond === '重' || cond === '不良') && r.weight >= 520) {
      r.score += 18; r.reasons.push('<span class="badge b-bad">重ダ適</span>');
    }

    if(dist <= 1400 && n(r.no) <= 4) { r.score += 10; r.reasons.push('<span class="badge b-wak">好枠</span>'); }

    const sortedByOdds = [...rows].sort((a,b)=>a.odds - b.odds);
    let idx = sortedByOdds.findIndex(s => s.no === r.no);
    if(idx > 0 && sortedByOdds[idx].odds / sortedByOdds[idx-1].odds > 1.5) { r.score += 15; r.reasons.push('<span class="badge b-gap">オッズ!!</span>'); }

    if($('antiFav').checked && r.pop === 1) r.score -= 60;
  });

  rows.sort((a,b)=>b.score - a.score);
  const r1 = rows[0]; 
  const aiteCnt = n($('aiteNum').value);
  const aiteList = rows.slice(1, aiteCnt + 1);
  const aiteNos = aiteList.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const top10Nos = rows.slice(0, 10).map(r=>r.no).sort((x,y)=>n(x)-n(y));

  $('tenkaiArea').innerHTML = `展開: ${isHighPace?'ハイ(差し有利)':'スロー(前残り)'} / 条件: ${cond}馬場・${dist}m`;
  let resHtml = "";
  rows.slice(0, aiteCnt + 1).forEach((r, i) => {
    resHtml += `<div style="margin-bottom:6px"><span class="style-tag">${r.style}</span><b>${i==0?'【軸】':'【相】'}${r.no}.${r.name}</b> ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  $('bet3tanM').innerHTML = `<small>3連単マルチ</small><br>軸: ${r1.no} / 相手: ${aiteNos.join(',')}`;
  $('bet3pukuF').innerHTML = `<small>3連複F (高確率回収型)</small><br>1列目: ${r1.no}<br>2列目: ${rows[1].no},${rows[2].no},${rows[3].no}<br>3列目: ${top10Nos.join(',')}`;

  let gHtml = "";
  const maxScore = rows[0].score;
  rows.slice(0, 10).forEach(r => {
    const w = (r.score / maxScore) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name}</span><span>${Math.round(r.score)}pt</span></div><div class="barbg"><div class="barfill" style="width:${Math.max(w,0)}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
