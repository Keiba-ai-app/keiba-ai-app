<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競馬AI V6.9.7</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#001f3f" />
  <style>
    body {
      background:#0b1220;
      margin:0;
      padding:20px;
      font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
<div style="background-color: #001f3f; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; border: 2px solid #0074D9;">
  <div style="background: linear-gradient(90deg, #0074D9 0%, #FF4136 100%); padding: 10px; text-align: center; border-radius: 5px; font-weight: bold; font-size: 18px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
    競馬AI V6.9.7 - フルスペック・全機能復旧版
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
    <div>
      <label style="font-size: 12px; color: #aaa;">競馬場</label>
      <select id="selCourse" style="width: 100%; padding: 10px; background: #001f3f; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="">選択してください</option>
        <optgroup label="中央競馬">
          <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
          <option value="京都">京都</option><option value="新潟">新潟</option><option value="小倉">小倉</option><option value="福島">福島</option>
          <option value="札幌">札幌</option><option value="函館">函館</option>
        </optgroup>
        <optgroup label="地方競馬">
          <option value="大井">大井</option><option value="船橋">船橋</option><option value="川崎">川崎</option><option value="浦和">浦和</option>
          <option value="門別">門別</option><option value="盛岡">盛岡</option><option value="金沢">金沢</option><option value="笠松">笠松</option>
          <option value="名古屋">名古屋</option><option value="園田">園田</option><option value="高知">高知</option><option value="佐賀">佐賀</option>
        </optgroup>
      </select>
    </div>
    <div>
      <label style="font-size: 12px; color: #aaa;">距離 (手入力)</label>
      <input id="inDist" type="text" placeholder="例: 1200" style="width: 100%; padding: 10px; background: #fff; color: #000; border: 1px solid #0074D9; border-radius: 5px; box-sizing: border-box; font-weight: bold;">
    </div>
    <div>
      <label style="font-size: 12px; color: #aaa;">馬場</label>
      <select id="selCond" style="width: 100%; padding: 10px; background: #001f3f; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="">選択してください</option>
        <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
      </select>
    </div>
    <div>
      <label style="font-size: 12px; color: #aaa;">回り</label>
      <select id="selDir" style="width: 100%; padding: 10px; background: #001f3f; color: #fff; border: 1px solid #0074D9; border-radius: 5px;">
        <option value="">選択してください</option>
        <option value="右回り">右回り</option><option value="左回り">左回り</option>
      </select>
    </div>
  </div>

  <div style="background: #003366; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #0074D9; display: flex; gap: 20px;">
    <div>
      <input type="checkbox" id="chkAnti" style="transform: scale(1.2);">
      <label for="chkAnti" style="font-weight: bold; margin-left: 5px;">1人気消し</label>
    </div>
    <div>
      <input type="checkbox" id="chkW" style="transform: scale(1.2);">
      <label for="chkW" style="font-weight: bold; margin-left: 5px;">W軸(1着2頭)</label>
    </div>
  </div>

  <textarea id="rawGrid" style="width: 100%; height: 120px; background: #003366; color: #fff; border: 1px solid #0074D9; border-radius: 5px; padding: 10px; resize: none; margin-bottom: 15px; box-sizing: border-box;" placeholder="ここにデータを貼り付け"></textarea>

  <button type="button" onclick="fnV6Full()" style="width: 100%; padding: 15px; background: linear-gradient(180deg, #FFD700 0%, #FF8C00 100%); color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor:pointer; box-shadow: 0 4px 0 #CC7A00; margin-bottom: 20px;">
    分析・買い目生成
  </button>

  <div id="v6Analysis" style="margin-bottom: 15px; background: #003366; padding: 10px; border-radius: 5px; border: 1px solid #0074D9; font-size: 13px;">
    <div style="color:#aaa;">ここに指数・断層分析が表示されます</div>
  </div>

  <div id="v6BetArea" style="background: #003366; padding: 15px; border-radius: 5px; border: 1px solid #0074D9; font-family: monospace;">
    <div style="color: #aaa;">ここに買い目が生成されます</div>
  </div>
</div>

<script>
window.fnV6Full = function() {
  var area = document.getElementById('rawGrid');
  if(!area || !area.value) {
    alert('データを貼り付けてください');
    return;
  }
  var lines = area.value.split('\n').filter(function(l){ return l.trim() !== ''; });
  var chkAnti = document.getElementById('chkAnti').checked;
  var chkW = document.getElementById('chkW').checked;

  var list = lines.map(function(line) {
    var d = line.split('\t');
    var s = parseFloat(d[4]) || 0;
    var o = parseFloat(d[3]) || 0;
    var txt = (d[1]||'') + (d[5]||'');
    if(document.getElementById('inDist').value && txt.includes(document.getElementById('inDist').value)) s += 5;
    if(document.getElementById('selCond').value && txt.includes(document.getElementById('selCond').value)) s += 5;
    if(document.getElementById('selCourse').value && txt.includes(document.getElementById('selCourse').value)) s += 5;
    if(document.getElementById('selDir').value && txt.includes(document.getElementById('selDir').value)) s += 5;
    return { no: d[0] || '', name: d[1] || '', pop: parseInt(d[2], 10) || 99, odds: o, score: s };
  });

  if (!list.length) {
    alert('データを読み取れませんでした');
    return;
  }

  list.sort(function(a,b){ return b.score - a.score; });

  var jiku = chkAnti ? list.filter(function(r){ return r.pop !== 1; })[0] : list[0];
  if (!jiku) jiku = list[0];

  var aite = list.filter(function(r){ return r.no !== jiku.no; });
  var h5 = aite.slice(0, 5).map(function(h){ return h.no; }).sort(function(a,b){ return Number(a)-Number(b); });
  var first = chkW && aite[0] ? [jiku.no, aite[0].no].sort(function(a,b){ return Number(a)-Number(b); }).join(',') : jiku.no;

  document.getElementById('v6BetArea').innerHTML =
    '<div style="color:#fff; font-size:16px; margin-bottom:12px;"><b>【3連単マルチ 60点】</b><br>軸 ' + jiku.no + ' ↔ 相手 ' + h5.join(', ') + '</div>' +
    '<hr style="border:0.5px solid #0074D9; margin:10px 0;">' +
    '<div style="color:#fff; font-size:16px;"><b>【3連単F】</b><br>' + first + ' → ' + h5.join(',') + ' → 全網羅(18頭)</div>' +
    '<div style="color:#aaa; margin-top:10px;"><b>【3連複F】</b><br>' + first + ' / ' + h5.join(',') + ' / 全網羅</div>';

  var maxS = Math.max.apply(null, list.map(function(d){ return d.score; }));
  if (!isFinite(maxS) || maxS <= 0) maxS = 1;

  document.getElementById('v6Analysis').innerHTML = list.slice(0, 10).map(function(r, i) {
    var gap = (i < list.length-1 && r.odds > 0) ? (list[i+1].odds / r.odds).toFixed(1) : '1.0';
    return '<div style="margin-bottom:8px;">' +
      '<div style="display:flex; justify-content:space-between;"><span>' + (i+1) + '.' + r.no + ' ' + r.name + '</span><span>' + r.score.toFixed(1) + 'pt</span></div>' +
      '<div style="width:100%; height:4px; background:#001f3f; border-radius:2px;"><div style="width:' + (r.score/maxS*100) + '%; height:100%; background:#0074D9;"></div></div>' +
      ((parseFloat(gap) >= 1.5) ? '<div style="color:#FF4136; font-size:10px; text-align:right;">▲断層 ' + gap + '倍</div>' : '') +
      '</div>';
  }).join('');
};
</script>
</body>
</html>
