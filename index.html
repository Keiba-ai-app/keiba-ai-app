<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI競馬分析 V51.0 Restore</title>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; padding: 15px; }
        .panel { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        textarea { width: 100%; height: 180px; background: #0f172a; color: #fff; border: 1px solid #334155; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; font-weight: bold; margin-top: 10px; border-radius: 5px; cursor: pointer; }
        #output { margin-top: 20px; white-space: pre-wrap; font-family: monospace; background: #1e293b; padding: 15px; border-radius: 5px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="panel">
        <textarea id="raw" placeholder="着順 枠番 馬番 馬名 タイム オッズ ...
データをここへ貼り付け"></textarea>
        <button onclick="run()">🚀 分析開始・買い目生成</button>
    </div>
    <div id="output" style="display:none;"></div>

<script>
function run() {
    const raw = document.getElementById('raw').value.trim();
    if(!raw) return;

    let hList = [];
    const lines = raw.split('\n');

    lines.forEach(line => {
        // 画像データのような形式を解析するため、数値のみを抽出
        const nums = line.match(/\d+(\.\d+)?/g);
        if(!nums || nums.length < 3) return;

        // データの順序: 着順(不要), 枠番(不要), 馬番, タイム(不要), オッズ, 人気
        // 指数は最後に追加されている想定で読み取る
        const no = nums[2]; 
        const odds = nums[nums.length-2];
        const pop = nums[nums.length-1];
        
        // 指数は別途入力があると仮定し、なければオッズからAI推定
        const score = (100 / odds) + (20 / pop); 

        hList.push({ no, pop, odds, score });
    });

    if(hList.length < 3) return;

    hList.sort((a,b) => b.score - a.score);
    let jiku = hList[0];
    let aite = hList.filter(h => h.no !== jiku.no).slice(0, 5);

    let res = `【推奨軸】 ${jiku.no}番\n`;
    res += `【推奨相手】 ${aite.map(h => h.no + "番").join(", ")}\n\n`;
    res += `【3連単マルチ(36点)】\n${jiku.no} ↔ ${aite.slice(0,3).map(h => h.no).join(", ")}\n\n`;
    res += `【3連単マルチ(60点)】\n${jiku.no} ↔ ${aite.map(h => h.no).join(", ")}\n\n`;
    res += `【指数ランキング】\n`;
    hList.forEach((h, i) => {
        res += `${i+1}位: ${h.no}番 (${h.score.toFixed(1)}pt)\n`;
    });

    const out = document.getElementById('output');
    out.innerText = res;
    out.style.display = 'block';
}
</script>
</body>
</html>
