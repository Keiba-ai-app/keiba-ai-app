<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI 推奨V1.7 - 距離選択復活・UI完全版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.banner{background:#7c2d12;border-radius:14px;padding:12px 14px;font-weight:900;margin-bottom:14px}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:16px}
.title{font-size:22px;font-weight:900;margin:0 0 12px;color:#f59e0b}
.row{display:grid;grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));gap:10px;margin-bottom:10px}
.box{background:#071225;border:1px solid #233252;border-radius:16px;padding:12px;overflow:hidden}
.v_bet{font-size:18px;color:#f59e0b;font-family:monospace;letter-spacing:1px;white-space:pre-wrap;word-break:break-all;line-height:1.4;max-height:120px;overflow-y:auto;padding:4px}
label{display:block;font-size:13px;font-weight:800;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:10px;padding:10px}
textarea{min-height:100px}
button{width:100%;border:none;border-radius:12px;padding:15px;font-size:18px;font-weight:900;cursor:pointer;background:#f59e0b;color:#111827}
.strategy-note{background:#1e293b;padding:10px;border-radius:12px;margin-bottom:10px;font-size:14px;border-left:4px solid #3b82f6}
.gap-mark{color:#ef4444;font-weight:bold;margin-left:4px}
.barwrap{display:flex;align-items:center;gap:8px;margin:8px 0}
.barlabel{width:140px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barbg{flex:1;height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #3b82f6, #60a5fa)}
@media(max-width:480px){ .row{grid-template-columns:repeat(2, 1fr)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V1.7 - 距離・UI修正版</div>

  <div class="card">
    <div class="row">
      <div><label>場</label><select id="track"><option>大井</option><option>船橋</option><option>中央</option></select></div>
      <div><label>馬場</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
      <div><label>距離</label>
        <select id="distance">
          <option value="1000">1000</option><option value="1200">1200</option><option value="1400" selected>1400</option>
          <option value="1600">1600</option><option value="1800">1800</option><option value="2000">2000</option>
        </select>
      </div>
      <div style="display:flex; align-items:center; padding-top:20px">
        <input type="checkbox" id="antiFav" style="width:24px;height:24px;margin-right:8px"><label for="antiFav" style="margin:0;color:#ef4444;font-size:11px">1人気外す</label>
      </div>
    </div>
    <textarea id="pasteArea" placeholder="馬番 馬名 人気 オッズ..."></textarea>
    <button onclick="calc()">分析＆買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 推奨 (馬番.名前)</div>
    <div class="row">
      <div class="box"><div style="font-size:11px;color:#ccc">推奨1</div><div id="rec1" style="font-weight:900">-</div></div>
      <div class="box"><div style="font-size:11px;color:#ccc">推奨2</div><div id="rec2" style="font-weight:900">-</div></div>
      <div class="box"><div style="font-size:11px;color:#ccc">推奨3</div><div id="rec3" style="font-weight:900">-</div></div>
      <div class="box" style="border:1px solid #ef4444"><div style="font-size:11px;color:#ef4444">★大穴</div><div id="darkHorse" style="font-weight:900;color:#fbbf24">-</div></div>
    </div>
  </div>

  <div id="strategy" class="strategy-note">距離・馬場を設定して分析してください。</div>

  <div class="card">
    <div class="title">💰 AI推奨買い目</div>
    <div class="box" style="margin-bottom:10px">
      <div style="font-size:12px;color:#cbd5e1">3連複フォーメーション</div>
      <div id="bet3puku" class="v_bet">-</div>
    </div>
    <div class="box" style="margin-bottom:10px">
      <div style="font-size:12px;color:#cbd5e1">3連単マルチ</div>
      <div id="bet3tanM" class="v_bet">-</div>
    </div>
    <div class="box">
      <div style="font-size:12px;color:#cbd5e1">3連単フォーメーション</div>
      <div id="bet3tanF" class="v_bet">-</div>
    </div>
  </div>

  <div class="card">
    <div class="title">📊 指数・断層評価</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.]/g,'')) || 0; }
function unique(arr){ return [...new Set(arr.filter(Boolean))]; }

function calc(){
  const lines = $('pasteArea').value.split('\n').filter(Boolean);
  let rows = [];
  lines.forEach(line => {
    const m = line.match(/^(\d+)\s+(.+?)\s+(\d+)\s+([0-9.]+)\s+/);
    if(m) rows.push({no:m[1], name:m[2], pop:n(m[3]), odds:n(m[4]), score:0, isGap:false});
  });

  if(rows.length < 6) return alert('データが足りません');

  const cond = $('cond').value;
  const dist = n($('distance').value);
  const isRough = (cond === '重' || cond === '不良');

  rows.forEach(r => {
    r.score = (20 - r.pop) + (r.odds < 10 ? 10 : 5);
    if(dist <= 1200 && r.pop <= 3) r.score += 5;
    if(dist >= 1600 && r.pop >= 5) r.score += 3;
    if(isRough && r.pop >= 7) r.score += 8; 
  });

  const sortedOdds = [...rows].sort((a,b)=>a.odds - b.odds);
  for(let i=1; i<sortedOdds.length; i++){
    if(sortedOdds[i].odds / sortedOdds[i-1].odds > 1.6) {
      let target = rows.find(r => r.no === sortedOdds[i].no);
      if(target) target.isGap = true;
    }
  }

  if($('antiFav').checked) rows.forEach(r => { if(r.pop === 1) r.score -= 20; });
  rows.sort((a,b)=>b.score - a.score);

  const r1 = rows[0]; const r2 = rows[1]; const r3 = rows[2];
  const dh = rows.find(r => r.pop >= 7 && (r.isGap || isRough)) || rows[rows.length-1];

  $('rec1').textContent = r1.no + '.' + r1.name;
  $('rec2').textContent = r2.no + '.' + r2.name;
  $('rec3').textContent = r3.no + '.' + r3.name;
  $('darkHorse').textContent = dh.no + '.' + dh.name;

  const baseAite = unique([r2.no, r3.no, rows[3]?.no, rows[4]?.no]);

  if(isRough){
    $('strategy').textContent = `【波乱戦略】${dist}m/${cond}。大穴${dh.no}番を軸・相手に。3列目全通り。`;
    $('bet3puku').textContent = `${r1.no} - ${unique([r2.no, r3.no, dh.no]).join(',')} - 全通り`;
    $('bet3tanM').textContent = `軸:${r1.no}\n相手:${unique([...baseAite.slice(0,3), dh.no]).join(',')} (36点)`;
    $('bet3tanF').textContent = `${r1.no},${r2.no} → ${unique([r2.no, r3.no, dh.no]).join(',')} → 全通り`;
  } else {
    $('strategy').textContent = `【堅実戦略】${dist}m/${cond}。評価上位で絞り込み。`;
    $('bet3puku').textContent = `${r1.no} - ${baseAite.join(',')} - ${rows.slice(0,9).map(r=>r.no).join(',')}`;
    $('bet3tanM').textContent = `軸:${r1.no}\n相手:${baseAite.join(',')} (36点)`;
    $('bet3tanF').textContent = `${r1.no} → ${baseAite.join(',')} → ${rows.slice(0,7).map(r=>r.no).join(',')}`;
  }

  let gHtml = '';
  rows.slice(0,10).forEach(r => {
    const w = (r.score / rows[0].score) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel">${r.no}.${r.name}${r.isGap?'!!':''}</div><div class="barbg"><div class="barfill" style="width:${w}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
