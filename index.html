<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競馬AI 推奨V1.5 - 馬場連動・穴馬昇格版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.banner{background:#7c2d12;border-radius:14px;padding:12px 14px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between}
.card{background:#0f172a;border:1px solid #233252;border-radius:20px;padding:16px;margin-bottom:16px}
.title{font-size:22px;font-weight:900;margin:0 0 12px;color:#f59e0b}
.row{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:10px;margin-bottom:10px}
.box{background:#071225;border:1px solid #233252;border-radius:16px;padding:12px}
.v_bet{font-size:20px;color:#f59e0b;font-family:monospace;letter-spacing:1px;white-space:pre-wrap}
label{display:block;font-size:13px;font-weight:800;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:10px;padding:10px}
textarea{min-height:120px}
button{width:100%;border:none;border-radius:12px;padding:15px;font-size:18px;font-weight:900;cursor:pointer;background:#f59e0b;color:#111827}
.strategy-note{background:#1e293b;padding:10px;border-radius:12px;margin-bottom:10px;font-size:14px;border-left:4px solid #3b82f6}
.gap-mark{color:#ef4444;font-weight:bold;margin-left:4px}
.barwrap{display:flex;align-items:center;gap:8px;margin:8px 0}
.barlabel{width:150px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.barbg{flex:1;height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #3b82f6, #60a5fa)}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner"><span>競馬AI V1.5 </span><span id="topStatus">馬場連動モード</span></div>

  <div class="card">
    <div class="row">
      <div><label>競馬場</label><select id="track"><option selected>大井</option><option>船橋</option><option>中央</option></select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良 (堅実)</option><option value="稍重">稍重</option><option value="重">重 (波乱)</option><option value="不良">不良 (大波乱)</option></select></div>
      <div><label>距離</label><input id="dist" type="number" value="1400"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:10px">
      <input type="checkbox" id="antiFav" style="width:20px"><label for="antiFav">1番人気を軸から外す</label>
    </div>
    <textarea id="pasteArea" placeholder="馬番 馬名 人気 オッズ 斤量 増減"></textarea>
    <button onclick="calc()">分析＆買い目生成</button>
  </div>

  <div id="strategy" class="strategy-note">馬場状態に合わせて買い目を最適化します。</div>

  <div class="card">
    <div class="title">💰 AI推奨買い目</div>
    <div class="box"><div style="font-size:12px;color:#cbd5e1">3連複フォーメーション</div><div id="bet3puku" class="v_bet">-</div></div>
    <div class="row" style="margin-top:10px">
      <div class="box"><div style="font-size:12px;color:#cbd5e1">3連単マルチ</div><div id="bet3tanM" class="v_bet">-</div></div>
      <div class="box"><div style="font-size:12px;color:#cbd5e1">3連単フォーメ</div><div id="bet3tanF" class="v_bet">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="title">📊 指数・断層評価</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.]/g,'')) || 0; }

function calc(){
  const lines = $('pasteArea').value.split('\n').filter(Boolean);
  let rows = [];
  lines.forEach(line => {
    const m = line.match(/^(\d+)\s+(.+?)\s+(\d+)\s+([0-9.]+)\s+/);
    if(m) rows.push({no:m[1], name:m[2], pop:n(m[3]), odds:n(m[4]), score:0, isGap:false});
  });

  if(rows.length < 6) return alert('データが足りません');

  const condition = $('cond').value;
  const isRough = (condition === '重' || condition === '不良');

  rows.forEach(r => {
    r.score = (20 - r.pop) + (r.odds < 10 ? 8 : 4);
    if(isRough && r.pop >= 7) r.score += 5;
  });

  const sortedOdds = [...rows].sort((a,b)=>a.odds - b.odds);
  for(let i=1; i<sortedOdds.length; i++){
    if(sortedOdds[i].odds / sortedOdds[i-1].odds > 1.6) {
      let target = rows.find(r => r.no === sortedOdds[i].no);
      if(target) target.isGap = true;
    }
  }

  if($('antiFav').checked) rows.forEach(r => { if(r.pop === 1) r.score -= 15; });

  rows.sort((a,b)=>b.score - a.score);
  const recs = rows.slice(0,6);
  const reserves = rows.slice(6,9);
  const dh = rows.find(r => r.pop >= 8 && (r.isGap || isRough)) || rows[Math.min(7, rows.length-1)];

  let puku3, tanM, tanF;
  const axis = recs[0].no;
  const mates = recs.slice(1,5).map(r=>r.no);

  if(isRough){
    $('strategy').textContent = `【${condition}戦略】穴馬${dh.no}番をマルチに投入。3連複は広域カバー。`;
    const multiAite = [...mates.slice(0,3), dh.no];
    tanM = `軸:${axis}\n相手:${multiAite.join(',')} (36点)`;
    puku3 = `${axis} - ${mates.join(',')} - 全通り`;
    tanF = `${axis},${recs[1].no}→${mates.join(',')}→全通り`;
  } else {
    $('strategy').textContent = `【${condition}戦略】本命サイドを強化。無駄な点数を削ります。`;
    tanM = `軸:${axis}\n相手:${mates.join(',')} (36点)`;
    puku3 = `${axis} - ${mates.join(',')} - ${rows.slice(0,9).map(r=>r.no).join(',')}`;
    tanF = `${axis}→${mates.join(',')}→${recs.map(r=>r.no).join(',')}`;
  }

  $('bet3puku').textContent = puku3;
  $('bet3tanM').textContent = tanM;
  $('bet3tanF').textContent = tanF;

  let gHtml = '';
  rows.slice(0,10).forEach(r => {
    const w = (r.score / rows[0].score) * 100;
    const mark = r.isGap ? '<span class="gap-mark">!!断層</span>' : '';
    gHtml += `<div class="barwrap"><div class="barlabel">${r.no}.${r.name}${mark}</div><div class="barbg"><div class="barfill" style="width:${w}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
  $('topStatus').textContent = 'DONE';
}
</script>
</body>
</html>
