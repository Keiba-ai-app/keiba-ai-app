<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V6.8 - 展開推測版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.row > div{flex:1}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px;appearance:none}
.anti-fav-btn {
  display: flex; align-items: center; justify-content: center;
  background: #1e293b; border: 2px solid #3b82f6; border-radius: 12px;
  padding: 15px; margin-bottom: 12px; cursor: pointer;
}
.anti-fav-btn.active { background: #1d4ed8; border-color: #60a5fa; }
.anti-fav-btn input { display: none; }
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px;color:#fff}
.b-dansou{background:#2563eb} .b-power{background:#dc2626} .b-ninki{background:#059669} .b-run{background:#7c3aed}
.barwrap{margin:12px 0} .barlabel{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease-out;}
hr{border:0;border-top:1px solid #233252;margin:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V6.8 - 展開推測エンジン</div>

  <div class="card">
    <div class="anti-fav-btn" onclick="toggleFav()" id="favBtn">
      <input type="checkbox" id="antiFav">
      <span id="favText" style="font-weight:900">⬜️ 1人気を【軸から外し相手へ】</span>
    </div>

    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
      <div><label>馬場</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重" selected>重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>種別</label><select id="surf"><option value="ダ" selected>ダート</option><option value="芝">芝</option></select></div>
      <div><label>回り</label><select id="rot"><option value="右" selected>右回り</option><option value="左">左回り</option></select></div>
    </div>
    <textarea id="pasteArea" rows="5" placeholder="データを貼り付け"></textarea>
    <button class="exec" onclick="calc()">AI展開分析・買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 AI推測：展開と脚質</div>
    <div id="tenkaiArea" style="font-size:13px;color:#f59e0b;margin-bottom:10px;font-weight:bold"></div>
    <div id="reasonArea" style="font-size:14px"></div>
  </div>

  <div class="card">
    <div class="title">💰 買い目 (完全同期)</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📊 指数ランキング</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function toggleFav(){
  const cb = $('antiFav'); cb.checked = !cb.checked;
  $('favBtn').classList.toggle('active', cb.checked);
  $('favText').innerHTML = cb.checked ? "✅ 1人気を【相手】に固定中" : "⬜️ 1人気を【軸から外し相手へ】";
}

function calc(){
  const inputData = $('pasteArea').value.trim();
  if(!inputData) return;
  const lines = inputData.split('\\n').filter(l => l.trim().length > 5);
  let allRows = [];

  lines.forEach((line, i) => {
    const p = line.trim().split(/\\s+/);
    if(p.length < 4) return;
    const pop = n(p[2]);
    const odds = n(p[3]);
    const weight = n(p[4]);
    const diff = p[p.length-1];

    let estStyle = "差"; 
    if(pop <= 3 && odds < 5.0) estStyle = "先";
    if(odds > 50.0) estStyle = "追";
    if(i === 0 || (pop === 1 && odds < 3.0)) estStyle = "逃";

    allRows.push({
      no: p[0], name: p[1], pop: pop, odds: odds, weight: weight, diff: diff, style: estStyle, score: 0, reasons: []
    });
  });

  if (allRows.length < 3) return alert('データが足りません');

  const antiFav = $('antiFav').checked;

  allRows.forEach(r => {
    r.score = (85 / (r.pop + 0.6)) + (45 / Math.log10(r.odds + 2));
    r.reasons = [`<span class="badge b-run">${r.style}</span>`];
    if(r.pop <= 3) r.reasons.push('<span class="badge b-ninki">能力</span>');

    const sorted = [...allRows].sort((a,b)=>a.odds - b.odds);
    let idx = sorted.findIndex(s => s.no === r.no);
    if(idx > 0 && sorted[idx].odds / sorted[idx-1].odds > 1.6) {
      r.score += 30; r.reasons.push('<span class="badge b-dansou">断層</span>');
    }
  });

  let rankRows = [...allRows].sort((a,b)=>b.score - a.score);
  let favHorse = allRows.find(r => r.pop === 1);
  let jiku, aiteList;

  if(antiFav && favHorse) {
    let others = rankRows.filter(r => r.no !== favHorse.no);
    jiku = others[0];
    aiteList = [favHorse, ...others.slice(1)];
  } else {
    jiku = rankRows[0];
    aiteList = rankRows.slice(1);
  }

  $('tenkaiArea').innerHTML = `AI展開分析：逃げ馬不在により「${jiku.style}」の${jiku.name}が主導権を握るスロー展開を予想`;

  let resHtml = `<div><b>【本命】 ${jiku.no}.${jiku.name}</b> ${jiku.reasons.join('')}</div><hr>`;
  aiteList.slice(0, 5).forEach(r => {
    resHtml += `<div style="margin-bottom:5px">相 ${r.no}.${r.name} ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  const selAite = aiteList.slice(0, 5).map(a=>a.no).sort((x,y)=>n(x)-n(y));
  $('bet3tanM').innerHTML = `3連単マルチ\n軸: ${jiku.no} / 相手: ${selAite.join(',')}`;
  $('bet3pukuF').innerHTML = `3連複F\n1: ${jiku.no} / 2: ${aiteList.slice(0,2).map(r=>r.no).join(',')} / 3: ${rankRows.slice(0,10).map(r=>r.no).sort((x,y)=>n(x)-n(y)).join(',')}`;

  let gHtml = "";
  rankRows.slice(0, 10).forEach(r => {
    const w = (r.score / rankRows[0].score) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name}</span><span>${Math.round(r.score)}pt</span></div><div class="barbg"><div class="barfill" style="width:${w}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
