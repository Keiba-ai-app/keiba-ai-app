<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V7.0.1 window関数版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V7.0.1 - window関数版</div>

  <div class="card">
    <div style="background:#111; padding:12px; border:2px solid #444; color:#fff; border-radius:10px; font-family:sans-serif;">
      <div style="margin-bottom:10px;">
        <input id="inDist" type="text" placeholder="距離 (例: 1200)" style="width:100%; padding:12px; background:#333; color:#fff; border:1px solid #555; margin-bottom:8px; border-radius:5px; font-size:16px;">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:8px;">
          <select id="selCond" style="padding:12px; background:#333; color:#fff; border:1px solid #555;">
            <option value="">馬場状態</option>
            <option value="良">良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option>
          </select>
          <select id="selDir" style="padding:12px; background:#333; color:#fff; border:1px solid #555;">
            <option value="">回り</option><option value="左">左回り</option><option value="右">右回り</option>
          </select>
        </div>

        <select id="selCourse" style="width:100%; padding:12px; background:#333; color:#fff; border:1px solid #555; margin-bottom:12px;">
          <option value="">競馬場を選択</option>
          <optgroup label="中央">
            <option value="中京">中京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="東京">東京</option>
            <option value="京都">京都</option><option value="新潟">新潟</option><option value="小倉">小倉</option><option value="福島">福島</option>
          </optgroup>
          <optgroup label="地方">
            <option value="大井">大井</option><option value="川崎">川崎</option><option value="船橋">船橋</option><option value="浦和">浦和</option><option value="高知">高知</option>
          </optgroup>
        </select>
      </div>

      <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button type="button" id="btnAnti" onclick="fnAnti()" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:5px; font-weight:bold;">1人気消し</button>
        <button type="button" id="btnW" onclick="fnW()" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:5px; font-weight:bold;">W軸(1着2頭)</button>
      </div>

      <button type="button" onclick="fnCalc()" style="width:100%; padding:20px; background:#3b82f6; color:#fff; border:none; border-radius:5px; font-weight:bold; font-size:20px; box-shadow: 0 4px 0 #1d4ed8;">🚀 分析実行</button>
    </div>

    <label style="display:block;font-size:12px;color:#cbd5e1;margin:10px 0 6px;">入力（タブ区切り: 馬番 馬名 人気 オッズ スコア 詳細）</label>
    <textarea id="rawGrid" rows="8" placeholder="1	馬名	3	5.2	72	中京 左 良 1200"></textarea>
  </div>

  <div class="card">
    <div class="title">💰 買い目</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📋 ランキング</div>
    <div id="horseList" style="font-size:14px"></div>
  </div>
</div>

<script>
// グローバル変数
var fAnti = false;
var fW = false;

// 確実に動くように関数をwindowに直結
window.fnAnti = function() {
  fAnti = !fAnti;
  document.getElementById('btnAnti').style.background = fAnti ? '#ef4444' : '#444';
  fnCalc();
};

window.fnW = function() {
  fW = !fW;
  document.getElementById('btnW').style.background = fW ? '#f59e0b' : '#444';
  fnCalc();
};

window.fnCalc = function() {
  var area = document.getElementById('rawGrid');
  if(!area || !area.value) { alert('データを入力してください'); return; }

  var lines = area.value.split('\n').filter(function(l){ return l.trim() !== ""; });
  var list = lines.map(function(line){
    var d = line.split('\t');
    var s = parseFloat(d[4]) || 0;
    var txt = (d[1] || "") + (d[5] || "");

    // 補正
    if(document.getElementById('inDist').value && txt.indexOf(document.getElementById('inDist').value) !== -1) s += 5;
    if(document.getElementById('selCond').value && txt.indexOf(document.getElementById('selCond').value) !== -1) s += 5;
    if(document.getElementById('selCourse').value && txt.indexOf(document.getElementById('selCourse').value) !== -1) s += 5;
    if(document.getElementById('selDir').value && txt.indexOf(document.getElementById('selDir').value) !== -1) s += 5;

    return { no: d[0], name: d[1], pop: parseInt(d[2]) || 99, score: s };
  }).filter(function(r){ return r.no && r.name; });

  if(list.length === 0) return;

  // ソート
  list.sort(function(a, b){ return b.score - a.score; });

  // 軸
  var jiku = fAnti ? list.filter(function(r){ return r.pop !== 1; })[0] : list[0];
  if(!jiku) jiku = list[0];
  var aite = list.filter(function(r){ return r.no !== jiku.no; });

  // 推奨7頭
  var h5 = aite.slice(0, 5);
  var f2 = aite.slice(5).filter(function(r){
    var idx = list.indexOf(r);
    return ((idx > 0) && (list[idx-1].score - r.score > 8)) || (idx >= 10 && r.score > 40);
  }).slice(0, 2);

  var hNos = h5.map(function(h){ return h.no; }).sort(function(a,b){ return a-b; });
  var comb = hNos.concat(f2.map(function(f){ return f.no; })).filter(function(v, i, arr){ return arr.indexOf(v) === i; }).sort(function(a,b){ return a-b; });
  var first = (fW && aite[0]) ? [jiku.no, aite[0].no].sort(function(a,b){ return a-b; }).join(',') : jiku.no;

  // 出力
  var out = function(id, h){ if(document.getElementById(id)) document.getElementById(id).innerHTML = h; };
  out('bet3tanM', '<b>【3連単マルチ】</b><br>軸 ' + jiku.no + ' ↔ 相手 ' + hNos.join(', '));
  out('bet3tanF', '<b>【3連単F】</b><br>' + first + ' → ' + comb.join(',') + ' → 18頭全網羅');
  out('bet3pukuF', '<b>【3連複F】</b><br>' + first + ' / ' + comb.join(',') + ' / 全網羅');

  var rnk = document.getElementById('horseList') || document.getElementById('ranking');
  if(rnk) {
    rnk.innerHTML = list.map(function(r, i){
      var isA = f2.some(function(f){ return f.no === r.no; });
      return '<div style="padding:5px; border-bottom:1px solid #333; color:' + (isA ? '#ef4444' : '#fff') + '">' +
        (i+1) + '位: ' + r.no + '番 (' + r.score.toFixed(1) + 'pt)' + (isA ? ' !!伏兵!!' : '') + '</div>';
    }).join('');
  }
};
</script>
</body>
</html>
