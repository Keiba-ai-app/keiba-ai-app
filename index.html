<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬AI分析 V8.0 Ultra Layer</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #020617; --bg-card: #1e293b; --bg-input: #0f172a;
            --text: #f1f5f9; --muted: #94a3b8; --accent: #3b82f6;
            --warn: #f59e0b; --danger: #ef4444; --success: #10b981; --border: #334155;
        }
        body { background: var(--bg-main); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 500px; margin: auto; }
        .panel { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .section-title { font-size: 11px; font-weight: bold; color: var(--warn); margin-bottom: 8px; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        select, input, textarea { width: 100%; padding: 10px; background: var(--bg-input); color: #fff; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; font-family: monospace; font-size: 12px; }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .tgl { flex: 1; padding: 10px; background: var(--border); border: none; border-radius: 6px; color: var(--muted); font-weight: bold; cursor: pointer; font-size: 12px; }
        .tgl.active { background: var(--accent); color: white; border: 1px solid #fff; }

        .exec-btn { width: 100%; padding: 16px; background: linear-gradient(180deg, #ef4444, #b91c1c); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #7f1d1d; }
        .exec-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #7f1d1d; }

        .card { background: var(--bg-card); padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; position: relative; }
        .dansou-mark { color: #ff00ff; font-weight: bold; font-size: 10px; margin-left: 5px; }
        .ana-mark { color: var(--warn); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .bar-row { margin-bottom: 6px; }
        .bar-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; gap: 8px; }
        .bar-info span:first-child { word-break: break-word; }
        .bar-bg { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; display: flex; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #2dd4bf); }
        .bar-fill.ana { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="section-title">Race Settings</div>
        <div class="grid">
            <select id="course">
                <option value="東京">東京</option><option value="中山">中山</option><option value="阪神">阪神</option><option value="京都">京都</option>
                <option value="大井">大井</option><option value="高知">高知</option><option value="船橋">船橋</option><option value="門別">門別</option>
            </select>
            <input type="number" id="dist" placeholder="距離 (m)">
        </div>
        <div class="btn-group">
            <button id="btnA" class="tgl" onclick="toggle('A')">1人気ベタ消し</button>
            <button id="btnW" class="tgl" onclick="toggle('W')">穴軸(期待値)モード</button>
        </div>
        <textarea id="raw" placeholder="馬番 名前 人気 オッズ 指数"></textarea>
        <button class="exec-btn" onclick="run()">🚀 高精度レイヤー分析実行</button>
    </div>

    <div id="res-area" style="display:none;">
        <div class="card" style="border-left-color: var(--success);">
            <div class="section-title" style="color:#fff">【AI推奨買い目】</div>
            <div id="bet-output" style="white-space: pre-wrap; font-family: monospace; font-size: 13px;"></div>
        </div>
        <div class="card" style="border-left-color: #ff00ff;">
            <div class="section-title" style="color:#ff00ff">【分析レイヤー / 全頭指数グラフ】</div>
            <div id="graph-output"></div>
        </div>
    </div>
</div>

<script>
    let modeA = false, modeW = false;
    function toggle(m) {
        if(m==='A') { modeA = !modeA; document.getElementById('btnA').classList.toggle('active'); }
        if(m==='W') { modeW = !modeW; document.getElementById('btnW').classList.toggle('active'); }
    }

    function run() {
        const raw = document.getElementById('raw').value.trim();
        if(!raw) {
            alert('データを入力してください');
            return;
        }
        const lines = raw.split('\n').filter(l => l.trim());
        let horses = lines.map(l => {
            const d = l.trim().split(/\s+/);
            if (d.length < 5) return null;
            const score = parseFloat(d[4]) || 0;
            const odds = parseFloat(d[3]) || 1;
            return { no: d[0], name: d[1], pop: parseInt(d[2]) || 99, odds: odds, score: score, ev: score / Math.sqrt(Math.max(odds, 1)) };
        }).filter(Boolean).sort((a,b) => b.score - a.score);

        if (horses.length < 2) {
            alert('有効なデータが不足しています');
            return;
        }

        let jiku;
        if (modeW) {
            jiku = [...horses].slice(0, 5).sort((a,b) => b.ev - a.ev)[0];
        } else if (modeA) {
            jiku = horses.find(h => h.pop !== 1) || horses[0];
        } else {
            jiku = horses[0];
        }

        const aite = horses.filter(h => h.no !== jiku.no).slice(0, 4);

        let betHtml = `★軸馬: ${jiku.no} ${jiku.name} (${jiku.pop}人気)\n`;
        betHtml += `--------------------------\n`;
        betHtml += `【馬連/ワイド】 ${jiku.no} ↔ ${aite.map(h=>h.no).join(', ')}\n`;
        betHtml += `【3連複/単F】  1着: ${jiku.no}\n              2着: ${aite.map(h=>h.no).join(', ')}\n              3着: 全通り`;
        document.getElementById('bet-output').textContent = betHtml;

        const maxScore = Math.max(...horses.map(h => h.score), 1);
        let graphHtml = "";
        
        horses.forEach((h, i) => {
            const isAna = (h.odds >= 15 && h.score > (maxScore * 0.8)) || (i >= 3 && h.ev > horses[0].ev * 0.7);
            const anaTag = isAna ? '<span class="ana-mark"> !!穴!!</span>' : '';
            
            let dansouTag = "";
            if (i > 0 && (horses[i-1].score - h.score) >= 5) {
                dansouTag = `<div class="dansou-mark">▲ 指数断層 (${(horses[i-1].score - h.score).toFixed(1)}pt)</div>`;
            }

            graphHtml += `
                ${dansouTag}
                <div class="bar-row">
                    <div class="bar-info">
                        <span>${i+1}. ${h.no} ${h.name} <small>${h.odds}倍</small>${anaTag}</span>
                        <span>${h.score}pt</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill ${isAna ? 'ana' : ''}" style="width:${(h.score/maxScore*100)}%"></div>
                    </div>
                </div>`;
        });

        document.getElementById('graph-output').innerHTML = graphHtml;
        document.getElementById('res-area').style.display = 'block';
    }
</script>
</body>
</html>
