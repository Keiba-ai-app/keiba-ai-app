<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V7.0.1 ダブル軸版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.row > div{flex:1}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155;word-break:break-all}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px}
.btn-group{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.btn-group button{flex:1;padding:10px;background:#1e293b;border:1px solid #3b82f6;color:#fff;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-group button.active{background:#3b82f6;border-color:#60a5fa}
.anti-fav-btn {
  display: flex; align-items: center; justify-content: center;
  background: #1e293b; border: 2px solid #3b82f6; border-radius: 12px;
  padding: 15px; margin-bottom: 12px; cursor: pointer;
}
.anti-fav-btn.active { background: #1d4ed8; border-color: #60a5fa; }
.anti-fav-btn input { display: none; }
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309;cursor:pointer}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;margin-left:5px;color:#fff}
.b-dansou{background:#2563eb} .b-run{background:#7c3aed} .b-ana{background:#ef4444}
.barwrap{margin:12px 0}
.barlabel{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.4s ease-out;}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V7.0.1 - ダブル軸対応版</div>

  <div class="card">
    <div class="anti-fav-btn" onclick="toggleFav()" id="favBtn">
      <input type="checkbox" id="antiFav">
      <span id="favText" style="font-weight:900">⬜️ 1人気を【軸候補】から外す</span>
    </div>

    <div class="row">
      <div><label>競馬場</label><select id="track">
        <optgroup label="主要地方">
          <option>船橋</option><option>大井</option><option>浦和</option><option>高知</option>
        </optgroup>
        <optgroup label="中央競馬">
          <option>中京</option><option>中山</option><option>阪神</option><option>東京</option><option>京都</option><option>新潟</option><option>小倉</option><option>福島</option><option>函館</option><option>札幌</option>
        </optgroup>
        <optgroup label="その他地方">
          <option>門別</option><option>川崎</option><option>金沢</option><option>名古屋</option><option>園田</option><option>佐賀</option>
        </optgroup>
      </select></div>
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
    </div>

    <div class="row">
      <div><label>買い目点数（マルチ用）</label>
        <div class="btn-group">
          <button id="btn36" onclick="setMode(36)" class="active" type="button">36点(相4)</button>
          <button id="btn60" onclick="setMode(60)" type="button">60点(相5)</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div><label>1着設定</label>
        <div class="btn-group">
          <button id="btnSingle" onclick="setDouble(false)" class="active" type="button">1頭</button>
          <button id="btnDouble" onclick="setDouble(true)" type="button">2頭</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div><label>種別</label><select id="surf"><option value="芝">芝</option><option value="ダ">ダート</option></select></div>
      <div><label>回り</label><select id="rot"><option value="左">左回り</option><option value="右">右回り</option></select></div>
    </div>
    <div class="row">
      <div><label>馬場</label><select id="cond"><option value="良" selected>良</option><option value="稍重">稍重</option><option value="重">重</option><option value="不良">不良</option></select></div>
      <div style="visibility:hidden"></div>
    </div>

    <textarea id="pasteArea" rows="5" placeholder="データを貼り付け"></textarea>
    <button class="exec" onclick="calc()">分析・買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 断層・爆穴検知</div>
    <div id="tenkaiArea" style="font-size:13px;color:#f59e0b;margin-bottom:10px;font-weight:bold"></div>
    <div id="reasonArea" style="font-size:14px"></div>
  </div>

  <div class="card">
    <div class="title">💰 買い目 (マルチ/F/3複F)</div>
    <div id="bet3tanM" class="v_bet">-</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">-</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">-</div>
  </div>

  <div class="card">
    <div class="title">📊 指数グラフ</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
let betMode = 36;
let doubleJiku = false;

function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function setMode(m){
  betMode = m;
  $('btn36').classList.toggle('active', m === 36);
  $('btn60').classList.toggle('active', m === 60);
  calc();
}

function setDouble(v){
  doubleJiku = v;
  $('btnSingle').classList.toggle('active', !v);
  $('btnDouble').classList.toggle('active', v);
  calc();
}

function toggleFav(){
  const cb = $('antiFav');
  cb.checked = !cb.checked;
  $('favBtn').classList.toggle('active', cb.checked);
  $('favText').innerHTML = cb.checked ? "✅ 1人気を【相手】に固定中" : "⬜️ 1人気を【軸候補】から外す";
  calc();
}

function calc(){
  const inputData = $('pasteArea').value.trim();
  if(!inputData){
    $('tenkaiArea').innerHTML = "";
    $('reasonArea').innerHTML = "";
    $('bet3tanM').innerHTML = "-";
    $('bet3tanF').innerHTML = "-";
    $('bet3pukuF').innerHTML = "-";
    $('graphArea').innerHTML = "";
    return;
  }

  const lines = inputData.split('\\n').filter(l => l.trim().length > 3);
  let allRows = [];

  lines.forEach((line) => {
    const p = line.trim().split(/\\s+/);
    if(p.length < 4) return;
    const pop = n(p[2]);
    const odds = n(p[3]);
    let estStyle = (pop === 1 || odds < 4.0) ? "先" : (odds > 30.0 ? "追" : "差");
    allRows.push({
      no: p[0], name: p[1], pop: pop, odds: odds,
      style: estStyle, score: 0, reasons: [], isBaku: false, isPotential: false
    });
  });

  if(allRows.length === 0) return;

  const cond = $('cond').value;
  const antiFav = $('antiFav').checked;
  let dansouMsg = "断層：なし";

  allRows.forEach(r => {
    let weight = (cond === '良') ? 0.6 : 1.5;
    r.score = (95 / (r.pop + 0.5)) + (50 / Math.log10(r.odds + 1.5));
    if(n(r.no) <= 4) r.score += 20;
    if(r.pop >= 6) r.score += (weight * 10);

    r.reasons = [`<span class="badge b-run">${r.style}</span>`];
    if(n(r.no) <= 4) r.reasons.push('<span class="badge b-run">内枠利</span>');

    const sortedByOdds = [...allRows].sort((a,b)=>a.odds - b.odds);
    let idx = sortedByOdds.findIndex(s => s.no === r.no);
    if(idx > 0 && sortedByOdds[idx].odds / sortedByOdds[idx-1].odds > 1.55){
      r.score += 25;
      r.reasons.push('<span class="badge b-dansou">断層</span>');
      r.isBaku = true;
      dansouMsg = `断層：${sortedByOdds[idx-1].no}と${sortedByOdds[idx].no}の間に壁`;
    }
  });

  // ご指定ロジック
  let rankRows = [...allRows].sort((a,b)=>b.score - a.score);
  let jiku = (antiFav) ? rankRows.filter(r => r.pop !== 1)[0] : rankRows[0];
  if(!jiku) jiku = rankRows[0];
  let aiteList = rankRows.filter(r => r.no !== jiku.no);

  // 本線5頭 + 伏兵2頭 判定
  rankRows.forEach((r, i) => {
    if (i >= 10 && r.score > 40) r.isPotential = true;
  });

  let honsenCount = (betMode === 36) ? 4 : 5;
  let honsen = aiteList.slice(0, honsenCount);
  let fukuhei = aiteList.slice(honsenCount).filter(r => {
    let idx = rankRows.findIndex(x => x.no === r.no);
    return (idx > 0 && (rankRows[idx-1].score - r.score > 8)) || (idx >= 10 && r.score > 40) || r.isBaku || r.isPotential;
  }).slice(0, 2);

  let honsenNos = honsen.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  let anaNos = fukuhei.map(a=>a.no).sort((x,y)=>n(x)-n(y));
  let combined = [...new Set([...honsenNos, ...anaNos])].sort((x,y)=>n(x)-n(y));

  let firstRow = doubleJiku && aiteList[0]
    ? [jiku.no, aiteList[0].no].sort((a,b)=>n(a)-n(b)).join(',')
    : jiku.no;

  // 表示
  $('tenkaiArea').innerHTML = `${$('track').value}(${$('rot').value}) / ${dansouMsg}`;

  let resHtml = `<div><b>軸: ${jiku.no}.${jiku.name}</b> ${jiku.reasons.join('')}</div><hr>`;
  honsen.forEach(r => {
    resHtml += `<div style="margin-bottom:3px">本線: ${r.no}.${r.name} ${r.reasons.join('')}</div>`;
  });
  fukuhei.forEach(r => {
    resHtml += `<div style="margin-bottom:3px">伏兵: ${r.no}.${r.name} ${r.reasons.join('')} <span class="badge b-ana">拾い</span></div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  $('bet3tanM').innerHTML = `【3連単マルチ ${betMode}点】\n軸: ${jiku.no} ↔ 相手: ${honsenNos.join(', ')}`;

  $('bet3tanF').innerHTML = `<span style="color:${doubleJiku?'#f59e0b':'#fff'}">3連単F: ${firstRow}</span> → ${combined.join(',')} → 18頭全網羅`;

  $('bet3pukuF').innerHTML = `<span style="color:${doubleJiku?'#f59e0b':'#fff'}">3連複F: ${firstRow}</span> / ${combined.join(',')} / 18頭全網羅`;

  let gHtml = "";
  rankRows.slice(0, 10).forEach(r => {
    const w = (r.score / rankRows[0].score) * 100;
    const mark = r.isBaku ? ' !!' : '';
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name}${mark}</span><span>${Math.round(r.score)}pt</span></div><div class="barbg"><div class="barfill" style="width:${w}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
