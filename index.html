<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>競馬AI V6.0 - 断層可視化版</title>
<style>
body{margin:0;background:#081121;color:#fff;font-family:sans-serif;line-height:1.4}
.wrap{max-width:100%;margin:0 auto;padding:10px;box-sizing:border-box}
.banner{background:linear-gradient(135deg, #1e40af, #7c2d12);border-radius:12px;padding:12px;font-weight:900;margin-bottom:10px;text-align:center}
.card{background:#0f172a;border:1px solid #233252;border-radius:15px;padding:15px;margin-bottom:12px;box-sizing:border-box}
.title{font-size:16px;font-weight:900;margin-bottom:10px;color:#f59e0b;border-left:4px solid #f59e0b;padding-left:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.row > div{flex:1}
.v_bet{font-size:15px;color:#f59e0b;font-family:monospace;white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;margin-top:5px;border:1px solid #334155}
label{display:block;font-size:11px;color:#cbd5e1;margin-bottom:4px}
select,input,textarea{width:100%;box-sizing:border-box;background:#091325;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px;appearance:none}
.anti-fav-btn {
  display: flex; align-items: center; justify-content: center;
  background: #450a0a; border: 2px solid #ef4444; border-radius: 12px;
  padding: 15px; margin-bottom: 12px; cursor: pointer;
}
.anti-fav-btn.active { background: #b91c1c; }
.anti-fav-btn input { display: none; }
button.exec{width:100%;border:none;border-radius:12px;padding:20px;font-size:20px;font-weight:900;background:#f59e0b;color:#111827;box-shadow:0 4px 0 #b45309;margin-top:5px}
/* バッジのデザイン */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold;margin-left:5px;color:#fff}
.b-dansou{background:#2563eb} /* 青: 断層 */
.b-power{background:#dc2626} /* 赤: パワー/馬体重 */
.b-ninki{background:#059669} /* 緑: 能力/人気 */
.barwrap{margin:12px 0} .barlabel{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
.barbg{height:12px;background:#1f2937;border-radius:6px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.5s ease-out;}
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">競馬AI V6.0 - 断層可視化</div>

  <div class="card">
    <div class="anti-fav-btn" id="favBtn" onclick="toggleFav()">
      <input type="checkbox" id="antiFav">
      <span class="anti-fav-text" id="favText" style="font-weight:900">⬜️ 1番人気を【買い目から除外】</span>
    </div>

    <div class="row">
      <div><label>競馬場</label><select id="track"><option>大井</option><option>船橋</option><option>川崎</option><option>浦和</option><option>中山</option><option>中京</option><option>東京</option><option>阪神</option></select></div>
      <div><label>馬場状態</label><select id="cond"><option value="良">良</option><option value="稍重">稍重</option><option value="重" selected>重</option><option value="不良">不良</option></select></div>
    </div>
    <div class="row">
      <div><label>種別</label><select id="surf"><option value="ダ" selected>ダート</option><option value="芝">芝</option></select></div>
      <div><label>回り</label><select id="rot"><option value="右" selected>右回り</option><option value="左">左回り</option></select></div>
    </div>
    <div class="row">
      <div><label>距離(m)</label><input id="distance" type="number" value="1200"></div>
      <div><label>相手</label><select id="aiteNum"><option value="5" selected>5頭</option><option value="4">4頭</option></select></div>
    </div>
    <textarea id="pasteArea" rows="5" placeholder="データを貼り付けてください"></textarea>
    <button class="exec" onclick="calc()">分析・買い目生成</button>
  </div>

  <div class="card">
    <div class="title">🎯 推奨理由と断層馬</div>
    <div id="tenkaiArea" style="font-size:12px;color:#cbd5e1;margin-bottom:8px"></div>
    <div id="reasonArea" style="font-size:14px"></div>
  </div>

  <div class="card">
    <div class="title">💰 買い目 (1人気除外連動済)</div>
    <div id="bet3tanM" class="v_bet">3連単マルチ</div>
    <div id="bet3tanF" class="v_bet" style="margin-top:10px">3連単F</div>
    <div id="bet3pukuF" class="v_bet" style="margin-top:10px">3連複F</div>
  </div>

  <div class="card">
    <div class="title">📊 スコアグラフ</div>
    <div id="graphArea"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }
function n(v){ return parseFloat(String(v).replace(/[^\d.+-]/g,'')) || 0; }

function toggleFav(){
  const cb = $('antiFav'); const btn = $('favBtn'); const txt = $('favText');
  cb.checked = !cb.checked;
  btn.classList.toggle('active', cb.checked);
  txt.innerHTML = cb.checked ? "✅ 1番人気を【完全に消去中】" : "⬜️ 1番人気を【買い目から除外】";
}

function calc(){
  const inputData = $('pasteArea').value.trim();
  if(!inputData) return alert('データを入力してください');
  const lines = inputData.split('\n').filter(l => l.trim().length > 5);
  let allRows = [];

  lines.forEach(line => {
    const p = line.trim().split(/\s+/);
    if(p.length < 3) return;
    const nums = p.map(x => n(x)).filter(x => !isNaN(x));
    const weightMatch = line.match(/(\d{3})\(/);
    allRows.push({
      no: p[0], name: p[1], pop: nums[1] || 99, odds: nums[2] || 99,
      weight: weightMatch ? n(weightMatch[1]) : 480, score: 0, reasons: []
    });
  });

  if(allRows.length < 3) return alert('データが足りません');

  const isDirt = ($('surf').value === 'ダ');
  const isRough = ($('cond').value !== '良');
  const antiFav = $('antiFav').checked;

  const sortedByOdds = [...allRows].sort((a,b)=>a.odds - b.odds);

  allRows.forEach(r => {
    r.score = (70 / (r.pop + 1)) + (30 / Math.log(r.odds + 1.5));
    r.reasons.push('<span class="badge b-ninki">能力</span>');

    if(isDirt && isRough && r.weight >= 515) {
      r.score += 35;
      r.reasons.push('<span class="badge b-power">パワー</span>');
    }

    let idx = sortedByOdds.findIndex(s => s.no === r.no);
    if(idx > 0) {
      const gap = sortedByOdds[idx].odds / sortedByOdds[idx-1].odds;
      if(gap > 1.6) {
        r.score += 25;
        r.reasons.push('<span class="badge b-dansou">断層</span>');
      }
    }
  });

  let activeRows = antiFav ? allRows.filter(r => r.pop !== 1) : allRows;
  activeRows.sort((a,b)=>b.score - a.score);

  if(activeRows.length < 3) return alert('データが足りません');

  const r1 = activeRows[0];
  const aite = activeRows.slice(1, n($('aiteNum').value) + 1).map(a=>a.no).sort((x,y)=>n(x)-n(y));
  const t10 = activeRows.slice(0, 10).map(r=>r.no).sort((x,y)=>n(x)-n(y));

  $('tenkaiArea').innerHTML = `設定: ${$('surf').value}・${$('cond').value} / 断層と馬体重を自動検知`;
  let resHtml = "";
  activeRows.slice(0, 6).forEach((r, i) => {
    resHtml += `<div style="margin-bottom:8px"><b>${i==0?'軸':'相'} ${r.no}.${r.name}</b> ${r.reasons.join('')}</div>`;
  });
  $('reasonArea').innerHTML = resHtml;

  $('bet3tanM').innerHTML = `3連単マルチ\n軸: ${r1.no} / 相手: ${aite.join(',')}`;
  $('bet3tanF').innerHTML = `3連単F\n1着: ${r1.no}\n2,3着: ${aite.join(',')}`;
  $('bet3pukuF').innerHTML = `3連複F\n1: ${r1.no}\n2: ${activeRows[1].no},${activeRows[2].no}\n3: ${t10.join(',')}`;

  let gHtml = "";
  const maxS = activeRows[0].score;
  const minS = activeRows[Math.min(activeRows.length-1, 9)].score;
  activeRows.slice(0, 10).forEach(r => {
    const denom = (maxS - minS * 0.4);
    const w = denom === 0 ? 100 : ((r.score - minS * 0.4) / denom) * 100;
    gHtml += `<div class="barwrap"><div class="barlabel"><span>${r.no}.${r.name} (${r.weight}kg)</span><span>${Math.round(r.score)}pt</span></div><div class="barbg"><div class="barfill" style="width:${Math.max(w,5)}%"></div></div></div>`;
  });
  $('graphArea').innerHTML = gHtml;
}
</script>
</body>
</html>
