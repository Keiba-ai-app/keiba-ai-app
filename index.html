<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬AI分析ダッシュボード V7.0 "NextGen"</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --warn: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        header h1 {
            font-size: 20px;
            margin: 0;
            color: var(--accent);
        }

        header span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .panel {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--warn);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            height: 120px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.2;
        }

        .option-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            background: var(--border);
            color: var(--text-muted);
            border: 2px solid transparent;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        .toggle-btn:hover { background: #475569; }
        .toggle-btn.active {
            background: var(--bg-input);
            color: var(--accent);
            border-color: var(--accent);
        }

        .exec-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(180deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8;
            transition: 0.1s;
        }

        .exec-btn:active {
            margin-top: 3px;
            box-shadow: 0 1px 0 #1d4ed8;
            margin-bottom: 12px;
        }

        #result-area { display: none; }

        .card {
            background: var(--bg-card);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            padding: 12px;
            margin-bottom: 10px;
        }

        .card.strategy { border-left-color: var(--success); }
        .card-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .bet-info {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            white-space: pre-wrap;
        }

        .rec-horse { color: var(--warn); }

        .chart-container {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .chart-row { margin-bottom: 15px; }
        .chart-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 3px;
        }

        .horse-name { font-weight: bold; }
        .score-val { color: var(--text-muted); }

        .bar-multi {
            width: 100%;
            height: 16px;
            background: var(--bg-input);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease-out;
        }

        .fill-power { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        .bar-ev {
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            margin-top: 2px;
            transition: width 0.3s ease-out;
        }

        .legend {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--text-muted);
            justify-content: center;
            margin-top: 10px;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>競馬AI分析 "NextGen"</h1>
        <span>的中率×期待値のハイブリッド・ロジック V7.0</span>
    </header>

    <div class="panel">
        <div class="panel-title">⏱️ レース情報（オプション）</div>
        <div class="grid-inputs">
            <select id="course">
                <option value="">競馬場選択</option>
                <option value="tokyo">東京</option><option value="nakayama">中山</option>
                <option value="hanshin">阪神</option><option value="kyoto">京都</option>
                <option value="oi">大井</option><option value="kochi">高知</option>
            </select>
            <select id="condition">
                <option value="1.0">馬場：良</option>
                <option value="1.1">馬場：稍重</option>
                <option value="1.2">馬場：重</option>
                <option value="1.3">馬場：不良</option>
            </select>
        </div>

        <div class="panel-title">🛠️ 分析オプション</div>
        <div class="option-group">
            <button id="opt_kiwami" class="toggle-btn" onclick="toggleOption(this)">⚡ 1人気ベタ消し（極）</button>
            <button id="opt_ana" class="toggle-btn" onclick="toggleOption(this)">⚁ 穴軸推奨（高回収）</button>
        </div>

        <div class="panel-title">📋 データ貼り付け（馬番 名前 人気 オッズ 指数）</div>
        <textarea id="rawData" placeholder="例：
1コントレイル 1 1.3 95.2
2グランアレグリア 2 3.5 90.1
3ディープボンド 5 12.0 88.5
..."></textarea>
    </div>

    <button class="exec-btn" onclick="analyzeRace()">🚀 AI高精度分析を実行</button>

    <div id="result-area">
        <div class="panel-title" style="margin-top:20px;">📊 分析結果</div>
        <div class="card strategy">
            <div class="card-label">推奨戦略</div>
            <div id="strategy-text" class="bet-info" style="color:white;"></div>
        </div>

        <div class="card">
            <div class="card-label">【3連単マルチ】 軸1頭ながせ</div>
            <div id="bets-multi" class="bet-info"></div>
        </div>

        <div class="card" style="border-left-color: var(--warn);">
            <div class="card-label">【馬連/ワイド】 期待値重視</div>
            <div id="bets-urew" class="bet-info"></div>
        </div>

        <div class="chart-container">
            <div class="panel-title" style="color:var(--text-main)">📊 能力(上段)・期待値(下段)グラフ</div>
            <div id="chart-content"></div>
            <div class="legend">
                <span><span class="dot" style="background:linear-gradient(90deg, #f59e0b, #ef4444)"></span>能力指数</span>
                <span><span class="dot" style="background:var(--accent)"></span>期待値（爆発力）</span>
            </div>
        </div>
    </div>
</div>

<script>
let options = { kiwami: false, ana: false };

function toggleOption(btn) {
    btn.classList.toggle('active');
    const id = btn.id.replace('opt_', '');
    options[id] = btn.classList.contains('active');
}

function analyzeRace() {
    const text = document.getElementById('rawData').value.trim();
    if (!text) {
        alert('データを貼り付けてください。');
        return;
    }

    const conditionFactor = parseFloat(document.getElementById('condition').value);
    const lines = text.split('\n');
    let horses = [];

    lines.forEach(line => {
        const d = line.trim().split(/\s+/);
        if (d.length < 5) return;

        const num = d[0].replace(/[^0-9]/g, '');
        const name = d[1];
        const pop = parseInt(d[2]);
        const odds = parseFloat(d[3]);
        const rawScore = parseFloat(d[4]);

        if (!num || isNaN(pop) || isNaN(odds) || isNaN(rawScore)) return;

        let adjustedScore = rawScore * (1 + (conditionFactor - 1) * 0.1);
        const expectedValue = adjustedScore / (odds * 1.5);
        horses.push({ num, name, pop, odds, score: adjustedScore, ev: expectedValue });
    });

    if (horses.length < 3) {
        alert('有効なデータが3頭分以上必要です。');
        return;
    }

    const sortedByScore = [...horses].sort((a, b) => b.score - a.score);
    const sortedByEV = [...horses].sort((a, b) => b.ev - a.ev);

    document.getElementById('result-area').style.display = 'block';

    let jiku = null;
    let stratDesc = '';

    if (options.kiwami) {
        jiku = sortedByScore.find(h => h.pop !== 1) || sortedByScore[0];
        stratDesc = '【波乱警報】1番人気を完全に軽視。能力上位の対抗馬から高配当を狙います。';
    } else if (options.ana) {
        const top5Power = sortedByScore.slice(0, 5);
        jiku = [...top5Power].sort((a, b) => b.ev - a.ev)[0];
        stratDesc = '【中穴狙い】能力上位の中で、オッズ的に最も美味しい馬を軸にします。';
    } else {
        jiku = sortedByScore[0];
        stratDesc = '【堅実派】AI指数の最も高い馬を信頼し、的中率重視で組み立てます。';
    }

    const aite = sortedByScore.filter(h => h.num !== jiku.num).slice(0, 5).map(h => h.num);
    const multiPoints = aite.length >= 2 ? aite.length * (aite.length - 1) * 3 : 0;
    const multiText = `軸: <span class="rec-horse">${jiku.num}</span> (${jiku.name})\n相手: ${aite.join(', ')}\n(計 ${multiPoints} 点)`;
    document.getElementById('bets-multi').innerHTML = multiText;

    const anaAite = sortedByEV.filter(h => h.num !== jiku.num).slice(0, 3).map(h => h.num);
    const ureText = `軸: <span class="rec-horse">${jiku.num}</span> ➡️ 相手: ${anaAite.join(', ')} (期待値上位)`;
    document.getElementById('bets-urew').innerHTML = ureText;
    document.getElementById('strategy-text').innerText = stratDesc;

    const chartContent = document.getElementById('chart-content');
    chartContent.innerHTML = '';

    const maxScore = Math.max(...horses.map(h => h.score));
    const maxEV = Math.max(...horses.map(h => h.ev));

    sortedByScore.slice(0, 6).forEach(h => {
        const scorePercent = (h.score / maxScore) * 100;
        const evPercent = (h.ev / maxEV) * 100;
        const isJiku = h.num === jiku.num;

        const rowHTML = `
            <div class="chart-row">
                <div class="chart-header">
                    <span class="horse-name ${isJiku ? 'rec-horse' : ''}">${h.num} ${h.name} <small>(${h.pop}人 ${h.odds.toFixed(1)})</small></span>
                    <span class="score-val">${h.score.toFixed(1)} pt</span>
                </div>
                <div class="bar-multi">
                    <div class="bar-fill fill-power" style="width: ${scorePercent}%"></div>
                </div>
                <div class="bar-ev" style="width: ${evPercent}%"></div>
            </div>
        `;
        chartContent.insertAdjacentHTML('beforeend', rowHTML);
    });
}
</script>
</body>
</html>
